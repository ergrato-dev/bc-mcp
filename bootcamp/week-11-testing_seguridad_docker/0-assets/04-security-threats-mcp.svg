<svg viewBox="0 0 880 540"
  xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Roboto, sans-serif">
  <rect width="880" height="540" fill="#111827"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" fill="#f9fafb" font-size="19" font-weight="700">Amenazas de Seguridad en MCP Tools</text>
  <text x="440" y="56" text-anchor="middle" fill="#9ca3af" font-size="12">OWASP Top 10 aplicado al contexto MCP — ataques más comunes y sus mitigaciones</text>

  <!-- Card 1: SQL Injection -->
  <rect x="30" y="72" width="260" height="198" rx="8" fill="#2a0a0a" stroke="#f87171" stroke-width="1.5"/>
  <rect x="30" y="72" width="260" height="32" rx="8" fill="#7f1d1d"/>
  <rect x="30" y="92" width="260" height="12" fill="#7f1d1d"/>
  <text x="160" y="94" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">SQL Injection</text>
  <text x="50" y="124" fill="#f87171" font-size="11" font-weight="600">❌ Vulnerable:</text>
  <text x="50" y="140" fill="#9ca3af" font-size="10">query = f"SELECT * FROM books</text>
  <text x="50" y="154" fill="#9ca3af" font-size="10">  WHERE title LIKE '%{"{q}"}%'"</text>
  <text x="50" y="172" fill="#4ade80" font-size="11" font-weight="600">✅ Mitigación:</text>
  <text x="50" y="188" fill="#9ca3af" font-size="10">cursor.execute(</text>
  <text x="50" y="202" fill="#9ca3af" font-size="10">  "SELECT * FROM books</text>
  <text x="50" y="216" fill="#9ca3af" font-size="10">   WHERE title LIKE ?",</text>
  <text x="50" y="230" fill="#9ca3af" font-size="10">  (f"%{"{q}"}%",)  # parámetros</text>
  <text x="50" y="248" fill="#60a5fa" font-size="10">→ aiosqlite parameterized queries</text>

  <!-- Card 2: Path Traversal -->
  <rect x="310" y="72" width="260" height="198" rx="8" fill="#1a1a0a" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="310" y="72" width="260" height="32" rx="8" fill="#78350f"/>
  <rect x="310" y="92" width="260" height="12" fill="#78350f"/>
  <text x="440" y="94" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">Path Traversal</text>
  <text x="330" y="124" fill="#f87171" font-size="11" font-weight="600">❌ Vulnerable:</text>
  <text x="330" y="140" fill="#9ca3af" font-size="10">path = f"/data/{"{filename}"}"</text>
  <text x="330" y="154" fill="#9ca3af" font-size="10">open(path).read()  # ../../etc/passwd</text>
  <text x="330" y="172" fill="#4ade80" font-size="11" font-weight="600">✅ Mitigación:</text>
  <text x="330" y="188" fill="#9ca3af" font-size="10">BASE = Path("/data").resolve()</text>
  <text x="330" y="202" fill="#9ca3af" font-size="10">target = (BASE / filename).resolve()</text>
  <text x="330" y="216" fill="#9ca3af" font-size="10">if not target.is_relative_to(BASE):</text>
  <text x="330" y="230" fill="#9ca3af" font-size="10">    raise ValueError("Access denied")</text>
  <text x="330" y="248" fill="#60a5fa" font-size="10">→ Path.resolve() + is_relative_to()</text>

  <!-- Card 3: Prompt Injection -->
  <rect x="590" y="72" width="260" height="198" rx="8" fill="#0a0a2a" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="590" y="72" width="260" height="32" rx="8" fill="#312e81"/>
  <rect x="590" y="92" width="260" height="12" fill="#312e81"/>
  <text x="720" y="94" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="700">Prompt Injection</text>
  <text x="610" y="124" fill="#f87171" font-size="11" font-weight="600">❌ Vulnerable:</text>
  <text x="610" y="140" fill="#9ca3af" font-size="10">system = f"Eres un asistente.</text>
  <text x="610" y="154" fill="#9ca3af" font-size="10">Contexto: {"{user_input}"}"</text>
  <text x="610" y="172" fill="#4ade80" font-size="11" font-weight="600">✅ Mitigación:</text>
  <text x="610" y="188" fill="#9ca3af" font-size="10">- Separar system prompt de user input</text>
  <text x="610" y="202" fill="#9ca3af" font-size="10">- Validar longitud máxima del input</text>
  <text x="610" y="216" fill="#9ca3af" font-size="10">- Sanitizar caracteres de control</text>
  <text x="610" y="230" fill="#9ca3af" font-size="10">- No ejecutar código del LLM</text>
  <text x="610" y="248" fill="#60a5fa" font-size="10">→ Arquitectura defense-in-depth</text>

  <!-- Card 4: Input Overflow / DoS -->
  <rect x="30" y="288" width="260" height="180" rx="8" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="30" y="288" width="260" height="32" rx="8" fill="#14532d"/>
  <rect x="30" y="308" width="260" height="12" fill="#14532d"/>
  <text x="160" y="310" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Input DoS / Overflow</text>
  <text x="50" y="338" fill="#f87171" font-size="11" font-weight="600">❌ Vulnerable:</text>
  <text x="50" y="354" fill="#9ca3af" font-size="10">query: str  # sin límite de longitud</text>
  <text x="50" y="368" fill="#9ca3af" font-size="10"># Input de 100MB bloquea el server</text>
  <text x="50" y="386" fill="#4ade80" font-size="11" font-weight="600">✅ Mitigación:</text>
  <text x="50" y="402" fill="#9ca3af" font-size="10">query: str = Field(max_length=500)</text>
  <text x="50" y="416" fill="#9ca3af" font-size="10">limit: int = Field(ge=1, le=100)</text>
  <text x="50" y="432" fill="#9ca3af" font-size="10">timeout: asyncio.timeout(10.0)</text>
  <text x="50" y="450" fill="#60a5fa" font-size="10">→ Pydantic Field + asyncio.timeout</text>

  <!-- Card 5: Exposed Secrets -->
  <rect x="310" y="288" width="260" height="180" rx="8" fill="#1a0a1a" stroke="#e879f9" stroke-width="1.5"/>
  <rect x="310" y="288" width="260" height="32" rx="8" fill="#4a044e"/>
  <rect x="310" y="308" width="260" height="12" fill="#4a044e"/>
  <text x="440" y="310" text-anchor="middle" fill="#f0abfc" font-size="13" font-weight="700">Secrets Expuestos</text>
  <text x="330" y="338" fill="#f87171" font-size="11" font-weight="600">❌ Vulnerable:</text>
  <text x="330" y="354" fill="#9ca3af" font-size="10">API_KEY = "sk-abc123"  # hardcoded</text>
  <text x="330" y="368" fill="#9ca3af" font-size="10">return f"Error: {"{secret_key}"}"</text>
  <text x="330" y="386" fill="#4ade80" font-size="11" font-weight="600">✅ Mitigación:</text>
  <text x="330" y="402" fill="#9ca3af" font-size="10">API_KEY = os.environ["API_KEY"]</text>
  <text x="330" y="416" fill="#9ca3af" font-size="10">.env en .gitignore</text>
  <text x="330" y="432" fill="#9ca3af" font-size="10">Errores genéricos al usuario</text>
  <text x="330" y="450" fill="#60a5fa" font-size="10">→ python-dotenv + manejo de errores</text>

  <!-- Card 6: Rate Limiting -->
  <rect x="590" y="288" width="260" height="180" rx="8" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="590" y="288" width="260" height="32" rx="8" fill="#451a03"/>
  <rect x="590" y="308" width="260" height="12" fill="#451a03"/>
  <text x="720" y="310" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">Sin Rate Limiting</text>
  <text x="610" y="338" fill="#f87171" font-size="11" font-weight="600">❌ Vulnerable:</text>
  <text x="610" y="354" fill="#9ca3af" font-size="10">search_openlibrary(title)  # sin límite</text>
  <text x="610" y="368" fill="#9ca3af" font-size="10"># LLM puede llamar 1000×/s → ban API</text>
  <text x="610" y="386" fill="#4ade80" font-size="11" font-weight="600">✅ Mitigación:</text>
  <text x="610" y="402" fill="#9ca3af" font-size="10">cache = TTLCache(maxsize=100, ttl=60)</text>
  <text x="610" y="416" fill="#9ca3af" font-size="10">@cached(cache)  # cachetools</text>
  <text x="610" y="432" fill="#9ca3af" font-size="10">asyncio.sleep() entre retries</text>
  <text x="610" y="450" fill="#60a5fa" font-size="10">→ cachetools TTLCache + retry logic</text>

  <!-- Bottom -->
  <text x="440" y="496" text-anchor="middle" fill="#6b7280" font-size="11">Principio: validar entradas · parametrizar queries · secretos en env · nunca confiar en el input del LLM</text>
</svg>
