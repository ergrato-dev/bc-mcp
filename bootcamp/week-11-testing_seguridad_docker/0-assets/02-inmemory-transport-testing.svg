<svg viewBox="0 0 860 520"
  xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Roboto, sans-serif">
  <rect width="860" height="520" fill="#111827"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#f9fafb" font-size="19" font-weight="700">Testing de MCP Servers: Python vs TypeScript</text>
  <text x="430" y="56" text-anchor="middle" fill="#9ca3af" font-size="12">Transports en memoria — sin I/O real, tests rápidos y deterministas</text>

  <!-- === PYTHON SIDE === -->
  <rect x="30" y="74" width="390" height="400" rx="8" fill="#0f2410" stroke="#22c55e" stroke-width="1.5"/>
  <text x="225" y="98" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">Python — pytest + pytest-asyncio</text>

  <!-- Step 1 -->
  <rect x="50" y="110" width="350" height="42" rx="5" fill="#1f2937" stroke="#374151"/>
  <text x="65" y="128" fill="#facc15" font-size="11" font-weight="600">IMPORT</text>
  <text x="65" y="144" fill="#d1d5db" font-size="11">from mcp.shared.memory import</text>
  <text x="65" y="144" fill="#d1d5db" font-size="11">    create_connected_server_and_client_session</text>

  <!-- Step 2 -->
  <rect x="50" y="162" width="350" height="60" rx="5" fill="#14532d" stroke="#22c55e"/>
  <text x="65" y="179" fill="#86efac" font-size="11" font-weight="600">FIXTURE — server en memoria</text>
  <text x="65" y="195" fill="#d1d5db" font-size="10">@pytest.fixture</text>
  <text x="65" y="209" fill="#d1d5db" font-size="10">async def mcp_client(server):  # ← tu FastMCP</text>

  <!-- Step 3 -->
  <rect x="50" y="232" width="350" height="78" rx="5" fill="#1f2937" stroke="#374151"/>
  <text x="65" y="250" fill="#60a5fa" font-size="11" font-weight="600">SETUP — context manager</text>
  <text x="65" y="267" fill="#9ca3af" font-size="10">async with create_connected_server_and_client_session(</text>
  <text x="65" y="281" fill="#9ca3af" font-size="10">    server._mcp_server</text>
  <text x="65" y="295" fill="#9ca3af" font-size="10">) as (server_session, client_session):</text>
  <text x="65" y="309" fill="#9ca3af" font-size="10">    yield client_session</text>

  <!-- Step 4 -->
  <rect x="50" y="320" width="350" height="78" rx="5" fill="#1f2937" stroke="#374151"/>
  <text x="65" y="338" fill="#22c55e" font-size="11" font-weight="600">TEST — llamar la tool</text>
  <text x="65" y="355" fill="#9ca3af" font-size="10">@pytest.mark.asyncio</text>
  <text x="65" y="369" fill="#9ca3af" font-size="10">async def test_add_book(mcp_client):</text>
  <text x="65" y="383" fill="#9ca3af" font-size="10">    result = await mcp_client.call_tool("add_book",</text>
  <text x="65" y="397" fill="#9ca3af" font-size="10">        {"title": "Test", "author": "A", "year": 2025})</text>

  <!-- Step 5 -->
  <rect x="50" y="408" width="350" height="42" rx="5" fill="#1e3a5f" stroke="#60a5fa"/>
  <text x="65" y="425" fill="#93c5fd" font-size="11" font-weight="600">ASSERT — verificar resultado</text>
  <text x="65" y="441" fill="#9ca3af" font-size="10">    assert result.content[0].text  # JSON válido con "success"</text>

  <!-- === TYPESCRIPT SIDE === -->
  <rect x="440" y="74" width="390" height="400" rx="8" fill="#0a1628" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="635" y="98" text-anchor="middle" fill="#67e8f9" font-size="15" font-weight="700">TypeScript — vitest</text>

  <!-- Step 1 TS -->
  <rect x="460" y="110" width="350" height="42" rx="5" fill="#1f2937" stroke="#374151"/>
  <text x="475" y="128" fill="#facc15" font-size="11" font-weight="600">IMPORT</text>
  <text x="475" y="144" fill="#d1d5db" font-size="11">import { InMemoryTransport } from</text>
  <text x="475" y="144" fill="#d1d5db" font-size="11">    "@modelcontextprotocol/sdk/inMemory.js"</text>

  <!-- Step 2 TS -->
  <rect x="460" y="162" width="350" height="60" rx="5" fill="#0c2442" stroke="#22d3ee"/>
  <text x="475" y="179" fill="#67e8f9" font-size="11" font-weight="600">LINKED PAIR — transports pareados</text>
  <text x="475" y="196" fill="#d1d5db" font-size="10">const [clientTransport, serverTransport] =</text>
  <text x="475" y="210" fill="#d1d5db" font-size="10">    InMemoryTransport.createLinkedPair()</text>

  <!-- Step 3 TS -->
  <rect x="460" y="232" width="350" height="78" rx="5" fill="#1f2937" stroke="#374151"/>
  <text x="475" y="250" fill="#60a5fa" font-size="11" font-weight="600">CONNECT — server y client</text>
  <text x="475" y="267" fill="#9ca3af" font-size="10">await server.connect(serverTransport)</text>
  <text x="475" y="281" fill="#9ca3af" font-size="10">const client = new Client({ name: "test", version: "1" })</text>
  <text x="475" y="295" fill="#9ca3af" font-size="10">await client.connect(clientTransport)</text>
  <text x="475" y="309" fill="#9ca3af" font-size="10">// No hay red real — todo en memoria</text>

  <!-- Step 4 TS -->
  <rect x="460" y="320" width="350" height="78" rx="5" fill="#1f2937" stroke="#374151"/>
  <text x="475" y="338" fill="#22d3ee" font-size="11" font-weight="600">TEST — llamar la tool</text>
  <text x="475" y="355" fill="#9ca3af" font-size="10">it("should add a book", async () => {"{"})</text>
  <text x="475" y="369" fill="#9ca3af" font-size="10">  const result = await client.callTool({"{"}</text>
  <text x="475" y="383" fill="#9ca3af" font-size="10">    name: "add_book",</text>
  <text x="475" y="397" fill="#9ca3af" font-size="10">    arguments: {"{"} title: "Test", author: "A" {"}"}</text>

  <!-- Step 5 TS -->
  <rect x="460" y="408" width="350" height="42" rx="5" fill="#1e3a5f" stroke="#60a5fa"/>
  <text x="475" y="425" fill="#93c5fd" font-size="11" font-weight="600">ASSERT — verificar resultado</text>
  <text x="475" y="441" fill="#9ca3af" font-size="10">  expect(result.content[0].text).toContain("success")</text>

  <!-- Center divider label -->
  <text x="430" y="492" text-anchor="middle" fill="#6b7280" font-size="11">Misma estrategia — diferente SDK · ambos sin I/O externo real</text>
</svg>
