<svg viewBox="0 0 880 560"
  xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Roboto, sans-serif">
  <rect width="880" height="560" fill="#111827"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" fill="#f9fafb" font-size="20" font-weight="700">Pirámide de Testing para MCP Servers</text>
  <text x="440" y="60" text-anchor="middle" fill="#9ca3af" font-size="13">Estrategia recomendada: muchos unitarios, pocos E2E</text>

  <!-- Pyramid base line -->
  <!-- Layer 3 — Unit Tests (base) -->
  <polygon points="110,480 770,480 620,340 260,340" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="440" y="420" text-anchor="middle" fill="#86efac" font-size="17" font-weight="700">Tests Unitarios</text>
  <text x="440" y="442" text-anchor="middle" fill="#4ade80" font-size="13">Funciones puras · helpers · validadores · conversores</text>
  <text x="440" y="462" text-anchor="middle" fill="#86efac" font-size="13">Herramienta: pytest · Rápidos · Sin I/O real</text>

  <!-- Layer 2 — Integration Tests (middle) -->
  <polygon points="260,340 620,340 510,200 370,200" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="440" y="278" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="700">Tests de Integración</text>
  <text x="440" y="298" text-anchor="middle" fill="#bfdbfe" font-size="12">create_connected_server_and_client_session</text>
  <text x="440" y="316" text-anchor="middle" fill="#93c5fd" font-size="12">InMemoryTransport · DB en memoria</text>

  <!-- Layer 1 — E2E Tests (top) -->
  <polygon points="370,200 510,200 440,100" fill="#3b0764" stroke="#a855f7" stroke-width="2"/>
  <text x="440" y="155" text-anchor="middle" fill="#d8b4fe" font-size="14" font-weight="700">E2E Tests</text>
  <text x="440" y="172" text-anchor="middle" fill="#c4b5fd" font-size="11">stdio · real DB</text>

  <!-- Left labels -->
  <text x="88" y="156" text-anchor="end" fill="#9ca3af" font-size="12">pocos</text>
  <text x="88" y="296" text-anchor="end" fill="#9ca3af" font-size="12">algunos</text>
  <text x="88" y="436" text-anchor="end" fill="#9ca3af" font-size="12">muchos</text>

  <!-- Right: tool annotations -->
  <!-- E2E box -->
  <rect x="545" y="92" width="290" height="50" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="560" y="113" fill="#d8b4fe" font-size="12" font-weight="600">pytest + servidor real</text>
  <text x="560" y="131" fill="#9ca3af" font-size="11">stdio_client → ClientSession → tool call</text>
  <line x1="510" y1="150" x2="545" y2="117" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Integration box -->
  <rect x="635" y="195" width="230" height="68" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="650" y="214" fill="#60a5fa" font-size="12" font-weight="600">Python: pytest-asyncio</text>
  <text x="650" y="232" fill="#9ca3af" font-size="11">create_connected_server_and_client_session</text>
  <text x="650" y="248" fill="#22d3ee" font-size="12" font-weight="600">TypeScript: vitest</text>
  <text x="650" y="264" fill="#9ca3af" font-size="11">InMemoryTransport.createLinkedPair()</text>
  <line x1="620" y1="270" x2="635" y2="263" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Unit box -->
  <rect x="635" y="355" width="200" height="68" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="650" y="375" fill="#22c55e" font-size="12" font-weight="600">pytest (Python)</text>
  <text x="650" y="393" fill="#9ca3af" font-size="11">pytest-asyncio · unittest.mock</text>
  <text x="650" y="411" fill="#facc15" font-size="12" font-weight="600">vitest (TypeScript)</text>
  <text x="650" y="429" fill="#9ca3af" font-size="11">vi.mock · describe / it / expect</text>
  <line x1="770" y1="410" x2="835" y2="412" stroke="none"/>
  <line x1="620" y1="410" x2="635" y2="408" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom stats bar -->
  <rect x="60" y="505" width="760" height="38" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="200" y="528" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">Unitarios: 60-70%</text>
  <line x1="340" y1="510" x2="340" y2="540" stroke="#374151" stroke-width="1"/>
  <text x="440" y="528" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600">Integración: 20-30%</text>
  <line x1="540" y1="510" x2="540" y2="540" stroke="#374151" stroke-width="1"/>
  <text x="680" y="528" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="600">E2E: 5-10%</text>
</svg>
