<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 390" width="820" height="390" font-family="system-ui, -apple-system, sans-serif">
  <rect width="820" height="390" fill="#0D1117"/>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3FB950"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F0883E"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#E6EDF3">Stdio Transport — Como Viajan los Mensajes</text>
  <text x="410" y="50" text-anchor="middle" font-size="12" fill="#8B949E">stdin y stdout como canal bidireccional entre client y server</text>

  <!-- ====== CLIENT PROCESS (left) ====== -->
  <rect x="20" y="75" width="220" height="280" rx="10" fill="#161B22" stroke="#BC8CFF" stroke-width="2"/>
  <rect x="20" y="75" width="220" height="30" rx="10" fill="#BC8CFF" fill-opacity="0.2"/>
  <rect x="20" y="93" width="220" height="12" fill="#BC8CFF" fill-opacity="0.2"/>
  <text x="130" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#BC8CFF">Python Client Process</text>

  <text x="35" y="128" font-size="9" fill="#8B949E">tu_app.py</text>
  <rect x="35" y="135" width="190" height="55" rx="5" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="45" y="152" font-size="8.5" fill="#E6EDF3">async with ClientSession(</text>
  <text x="55" y="164" font-size="8.5" fill="#58A6FF">read</text>
  <text x="75" y="164" font-size="8.5" fill="#E6EDF3">,</text>
  <text x="82" y="164" font-size="8.5" fill="#58A6FF">write</text>
  <text x="104" y="164" font-size="8.5" fill="#E6EDF3">) as session:</text>
  <text x="55" y="176" font-size="8.5" fill="#E6EDF3">result = await session</text>
  <text x="55" y="188" font-size="8.5" fill="#E6EDF3">  .call_tool(…)</text>

  <!-- write pipe output -->
  <text x="35" y="218" font-size="9" fill="#3FB950" font-weight="700">write stream (→ stdin del server)</text>
  <rect x="35" y="224" width="190" height="36" rx="5" fill="#3FB950" fill-opacity="0.07" stroke="#3FB950" stroke-width="1"/>
  <text x="45" y="238" font-size="8" fill="#E6EDF3">{"jsonrpc":"2.0","method":"tools/call",</text>
  <text x="45" y="250" font-size="8" fill="#E6EDF3"> "id":1,"params":{…}}</text>

  <!-- read pipe input -->
  <text x="35" y="283" font-size="9" fill="#F0883E" font-weight="700">read stream (← stdout del server)</text>
  <rect x="35" y="289" width="190" height="36" rx="5" fill="#F0883E" fill-opacity="0.07" stroke="#F0883E" stroke-width="1"/>
  <text x="45" y="303" font-size="8" fill="#E6EDF3">{"jsonrpc":"2.0","id":1,</text>
  <text x="45" y="315" font-size="8" fill="#E6EDF3"> "result":{"content":[…]}}</text>

  <text x="35" y="345" font-size="8.5" fill="#8B949E">newline \n delimita cada mensaje</text>

  <!-- ====== SERVER PROCESS (right) ====== -->
  <rect x="580" y="75" width="220" height="280" rx="10" fill="#161B22" stroke="#3FB950" stroke-width="2"/>
  <rect x="580" y="75" width="220" height="30" rx="10" fill="#3FB950" fill-opacity="0.2"/>
  <rect x="580" y="93" width="220" height="12" fill="#3FB950" fill-opacity="0.2"/>
  <text x="690" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#3FB950">Python Server Process</text>

  <text x="595" y="128" font-size="9" fill="#8B949E">server.py (stdio_server)</text>
  <rect x="595" y="135" width="190" height="55" rx="5" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="605" y="152" font-size="8.5" fill="#E6EDF3">mcp = FastMCP("mi-server")</text>
  <text x="605" y="164" font-size="8.5" fill="#8B949E">...</text>
  <text x="605" y="176" font-size="8.5" fill="#E6EDF3">mcp.run(transport=</text>
  <text x="605" y="188" font-size="8.5" fill="#F0883E">  "stdio"</text>
  <text x="726" y="188" font-size="8.5" fill="#E6EDF3">)</text>

  <!-- stdin side -->
  <text x="595" y="218" font-size="9" fill="#3FB950" font-weight="700">stdin (lee requests del client)</text>
  <rect x="595" y="224" width="190" height="36" rx="5" fill="#3FB950" fill-opacity="0.07" stroke="#3FB950" stroke-width="1"/>
  <text x="605" y="238" font-size="8" fill="#E6EDF3">process.stdin → asyncio</text>
  <text x="605" y="250" font-size="8" fill="#E6EDF3">StreamReader (SDK lo gestiona)</text>

  <!-- stdout side -->
  <text x="595" y="283" font-size="9" fill="#F0883E" font-weight="700">stdout (escribe respuestas)</text>
  <rect x="595" y="289" width="190" height="36" rx="5" fill="#F0883E" fill-opacity="0.07" stroke="#F0883E" stroke-width="1"/>
  <text x="605" y="303" font-size="8" fill="#E6EDF3">json.dumps(response) + "\n"</text>
  <text x="605" y="315" font-size="8" fill="#E6EDF3">→ sys.stdout.buffer.write()</text>

  <text x="595" y="345" font-size="8.5" fill="#8B949E">proceso hijo lanzado con subprocess</text>

  <!-- ====== PIPES (center) ====== -->
  <!-- Pipe body top (stdin → server) -->
  <rect x="245" y="195" width="330" height="42" rx="8" fill="#3FB950" fill-opacity="0.08" stroke="#3FB950" stroke-width="1.5"/>
  <text x="410" y="211" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3FB950">STDIN pipe (client escribe → server lee)</text>
  <text x="410" y="228" text-anchor="middle" font-size="8.5" fill="#8B949E">asyncio.subprocess.PIPE</text>
  <!-- arrow right -->
  <line x1="385" y1="216" x2="565" y2="216" stroke="#3FB950" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Pipe body bottom (stdout → client) -->
  <rect x="245" y="265" width="330" height="42" rx="8" fill="#F0883E" fill-opacity="0.08" stroke="#F0883E" stroke-width="1.5"/>
  <text x="410" y="281" text-anchor="middle" font-size="9.5" font-weight="700" fill="#F0883E">STDOUT pipe (server escribe → client lee)</text>
  <text x="410" y="298" text-anchor="middle" font-size="8.5" fill="#8B949E">asyncio.subprocess.PIPE</text>
  <!-- arrow left -->
  <line x1="435" y1="281" x2="255" y2="281" stroke="#F0883E" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Transport label (center top) -->
  <rect x="310" y="120" width="200" height="58" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="410" y="139" text-anchor="middle" font-size="10" font-weight="700" fill="#58A6FF">StdioServerParameters</text>
  <text x="320" y="154" font-size="8.5" fill="#E6EDF3">command = </text>
  <text x="373" y="154" font-size="8.5" fill="#F0883E">"python"</text>
  <text x="320" y="166" font-size="8.5" fill="#E6EDF3">args = </text>
  <text x="354" y="166" font-size="8.5" fill="#F0883E">["src/server.py"]</text>

  <!-- connection lines client→pipe and pipe→server -->
  <line x1="225" y1="237" x2="245" y2="216" stroke="#3FB950" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="225" y1="307" x2="245" y2="286" stroke="#F0883E" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="575" y1="216" x2="595" y2="237" stroke="#3FB950" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="575" y1="286" x2="595" y2="307" stroke="#F0883E" stroke-width="1.2" stroke-dasharray="3,2"/>
</svg>
