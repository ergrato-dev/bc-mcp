<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" width="820" height="500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="820" height="500" fill="#0D1117"/>

  <defs>
    <marker id="sw-r" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#58A6FF"/>
    </marker>
    <marker id="sw-l" markerWidth="7" markerHeight="5" refX="1" refY="2.5" orient="auto">
      <path d="M7,0 L7,5 L0,2.5 z" fill="#3FB950"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#E6EDF3">Flujo Completo de un Tool Call — Diagrama de Secuencia</text>
  <text x="410" y="46" text-anchor="middle" font-size="11" fill="#8B949E">Desde call_tool() hasta recibir el resultado</text>

  <!-- ====== SWIMLANE HEADERS ====== -->
  <rect x="20" y="58" width="200" height="32" rx="6" fill="#BC8CFF" fill-opacity="0.18" stroke="#BC8CFF" stroke-width="1.5"/>
  <text x="120" y="79" text-anchor="middle" font-size="11" font-weight="700" fill="#BC8CFF">Tu App (Python)</text>

  <rect x="310" y="58" width="200" height="32" rx="6" fill="#58A6FF" fill-opacity="0.18" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="410" y="79" text-anchor="middle" font-size="11" font-weight="700" fill="#58A6FF">ClientSession (SDK)</text>

  <rect x="600" y="58" width="200" height="32" rx="6" fill="#3FB950" fill-opacity="0.18" stroke="#3FB950" stroke-width="1.5"/>
  <text x="700" y="79" text-anchor="middle" font-size="11" font-weight="700" fill="#3FB950">MCP Server</text>

  <!-- Lifelines -->
  <line x1="120" y1="90" x2="120" y2="480" stroke="#BC8CFF" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="410" y1="90" x2="410" y2="480" stroke="#58A6FF" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="700" y1="90" x2="700" y2="480" stroke="#3FB950" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ====== SEQUENCE STEPS ====== -->

  <!-- Step 1: Tu App → SDK: call_tool() -->
  <rect x="60" y="108" width="120" height="20" rx="3" fill="#BC8CFF" fill-opacity="0.15"/>
  <text x="120" y="122" text-anchor="middle" font-size="8.5" fill="#BC8CFF">result = await</text>
  <line x1="120" y1="130" x2="398" y2="130" stroke="#58A6FF" stroke-width="1.8" marker-end="url(#sw-r)"/>
  <rect x="200" y="118" width="110" height="14" rx="3" fill="#0D1117"/>
  <text x="255" y="129" text-anchor="middle" font-size="8.5" fill="#58A6FF">session.call_tool("search_books", …)</text>

  <!-- Step 2: SDK builds JSON-RPC -->
  <rect x="350" y="145" width="120" height="20" rx="3" fill="#58A6FF" fill-opacity="0.15"/>
  <text x="410" y="159" text-anchor="middle" font-size="8.5" fill="#58A6FF">serializa JSON-RPC</text>

  <!-- Step 3: SDK → Server: stdin write -->
  <line x1="410" y1="172" x2="688" y2="172" stroke="#58A6FF" stroke-width="1.8" marker-end="url(#sw-r)"/>
  <rect x="440" y="160" width="140" height="14" rx="3" fill="#0D1117"/>
  <text x="510" y="170" text-anchor="middle" font-size="8.5" fill="#8B949E">stdin → {method:"tools/call", id:1}</text>

  <!-- Step 4: Server processes -->
  <rect x="640" y="185" width="120" height="20" rx="3" fill="#3FB950" fill-opacity="0.15"/>
  <text x="700" y="199" text-anchor="middle" font-size="8.5" fill="#3FB950">ejecuta el handler</text>

  <!-- Step 4b: Server does work -->
  <rect x="640" y="212" width="120" height="20" rx="3" fill="#3FB950" fill-opacity="0.10"/>
  <text x="700" y="226" text-anchor="middle" font-size="8.5" fill="#8B949E">query SQLite / call API</text>

  <!-- Step 5: Server → SDK: stdout response -->
  <line x1="700" y1="240" x2="422" y2="240" stroke="#3FB950" stroke-width="1.8" marker-end="url(#sw-l)"/>
  <rect x="440" y="228" width="150" height="14" rx="3" fill="#0D1117"/>
  <text x="515" y="238" text-anchor="middle" font-size="8.5" fill="#8B949E">stdout → {result:{content:[…]}, id:1}</text>

  <!-- Step 6: SDK deserializes -->
  <rect x="350" y="253" width="120" height="20" rx="3" fill="#58A6FF" fill-opacity="0.15"/>
  <text x="410" y="267" text-anchor="middle" font-size="8.5" fill="#58A6FF">deserializa a CallToolResult</text>

  <!-- Step 7: SDK → Tu App: return -->
  <line x1="410" y1="282" x2="132" y2="282" stroke="#3FB950" stroke-width="1.8" marker-end="url(#sw-l)"/>
  <rect x="195" y="270" width="110" height="14" rx="3" fill="#0D1117"/>
  <text x="250" y="280" text-anchor="middle" font-size="8.5" fill="#3FB950">CallToolResult(content=[…])</text>

  <!-- Step 8: Tu App processes result -->
  <rect x="60" y="295" width="120" height="20" rx="3" fill="#BC8CFF" fill-opacity="0.15"/>
  <text x="120" y="309" text-anchor="middle" font-size="8.5" fill="#BC8CFF">procesa result.content</text>

  <!-- ====== RESULT DETAIL BOX ====== -->
  <rect x="20" y="332" width="200" height="130" rx="8" fill="#161B22" stroke="#BC8CFF" stroke-width="1"/>
  <text x="120" y="350" text-anchor="middle" font-size="9.5" font-weight="700" fill="#BC8CFF">Acceso al resultado:</text>
  <text x="30" y="368" font-size="8.5" fill="#8B949E">for item in result.content:</text>
  <text x="30" y="381" font-size="8.5" fill="#BC8CFF">  if isinstance</text>
  <text x="96" y="381" font-size="8.5" fill="#E6EDF3">(item,</text>
  <text x="30" y="394" font-size="8.5" fill="#58A6FF">    TextContent</text>
  <text x="100" y="394" font-size="8.5" fill="#E6EDF3">):</text>
  <text x="30" y="407" font-size="8.5" fill="#E6EDF3">    print(item.text)</text>
  <text x="30" y="425" font-size="8.5" fill="#8B949E">result.isError → bool</text>
  <text x="30" y="440" font-size="8.5" fill="#8B949E">result.content[0].text → str</text>

  <!-- ====== ERROR PATH ====== -->
  <rect x="310" y="332" width="200" height="80" rx="8" fill="#161B22" stroke="#FF7B72" stroke-width="1"/>
  <text x="410" y="350" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FF7B72">Si hay error de protocolo:</text>
  <text x="320" y="367" font-size="8.5" fill="#8B949E">SDK lanza McpError</text>
  <text x="320" y="380" font-size="8.5" fill="#8B949E">→ try/except McpError</text>
  <text x="320" y="396" font-size="8.5" fill="#8B949E">Si el server devuelve isError:</text>
  <text x="320" y="409" font-size="8.5" fill="#8B949E">→ result.isError == True</text>

  <!-- Note numbers on left -->
  <text x="22" y="135" font-size="8" fill="#8B949E">①</text>
  <text x="22" y="177" font-size="8" fill="#8B949E">②</text>
  <text x="22" y="245" font-size="8" fill="#8B949E">③</text>
  <text x="22" y="287" font-size="8" fill="#8B949E">④</text>
</svg>
