<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <rect width="820" height="480" fill="#0D1117"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#E6EDF3">Anatomía de un MCP Server con FastMCP</text>
  <line x1="60" y1="48" x2="760" y2="48" stroke="#30363D" stroke-width="1"/>

  <!-- Layer 1: LLM Client -->
  <rect x="60" y="68" width="700" height="80" rx="8" fill="#0D2030" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="82" y="92" font-family="system-ui, sans-serif" font-size="11" fill="#8B949E">CAPA 1 — CLIENTE</text>
  <text x="410" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#58A6FF">LLM Client</text>
  <text x="410" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E">Claude Desktop · MCP Inspector · Claude API</text>

  <!-- Arrows stdin/stdout -->
  <line x1="290" y1="148" x2="290" y2="184" stroke="#3FB950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="296" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#3FB950">stdin (JSON-RPC requests)</text>

  <line x1="530" y1="184" x2="530" y2="148" stroke="#F0883E" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="540" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#F0883E">stdout (JSON-RPC responses)</text>

  <!-- Layer 2: Transport -->
  <rect x="60" y="188" width="700" height="64" rx="8" fill="#140E1E" stroke="#6B4FBB" stroke-width="1.5"/>
  <text x="82" y="210" font-family="system-ui, sans-serif" font-size="11" fill="#8B949E">CAPA 2 — TRANSPORT</text>
  <text x="410" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#BC8CFF">StdioServerTransport</text>
  <text x="410" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E">Lee stdin · Escribe stdout · Parsea JSON-RPC 2.0</text>

  <!-- Arrow Transport → FastMCP -->
  <line x1="410" y1="252" x2="410" y2="280" stroke="#8B949E" stroke-width="2" marker-end="url(#arrowGrey)"/>
  <text x="420" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#8B949E">requests tipadas</text>

  <!-- Layer 3: FastMCP -->
  <rect x="60" y="284" width="700" height="160" rx="8" fill="#0E1A10" stroke="#3FB950" stroke-width="1.5"/>
  <text x="82" y="306" font-family="system-ui, sans-serif" font-size="11" fill="#8B949E">CAPA 3 — SERVIDOR</text>
  <text x="410" y="324" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#3FB950">FastMCP Instance</text>
  <text x="200" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E">mcp = FastMCP("my-server")</text>

  <!-- Tool boxes -->
  <rect x="100" y="364" width="160" height="44" rx="6" fill="#161B22" stroke="#3FB950" stroke-width="1"/>
  <text x="180" y="382" text-anchor="middle" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#3FB950">@mcp.tool()</text>
  <text x="180" y="398" text-anchor="middle" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">async def add(...)</text>

  <rect x="290" y="364" width="160" height="44" rx="6" fill="#161B22" stroke="#3FB950" stroke-width="1"/>
  <text x="370" y="382" text-anchor="middle" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#3FB950">@mcp.tool()</text>
  <text x="370" y="398" text-anchor="middle" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">async def search(...)</text>

  <rect x="480" y="364" width="160" height="44" rx="6" fill="#161B22" stroke="#3FB950" stroke-width="1"/>
  <text x="560" y="382" text-anchor="middle" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#3FB950">@mcp.tool()</text>
  <text x="560" y="398" text-anchor="middle" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">async def fetch(...)</text>

  <text x="680" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#8B949E">···</text>

  <!-- mcp.run() note -->
  <text x="410" y="430" text-anchor="middle" font-family="Menlo, monospace, sans-serif" font-size="12" fill="#F0883E">mcp.run()  →  inicia el loop de eventos y conecta el transport</text>

  <!-- Defs -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3FB950"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F0883E"/>
    </marker>
    <marker id="arrowGrey" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8B949E"/>
    </marker>
  </defs>
</svg>
