<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <rect width="820" height="440" fill="#0D1117"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#E6EDF3">Debugging de MCP Servers en Python</text>
  <line x1="60" y1="48" x2="760" y2="48" stroke="#30363D" stroke-width="1"/>

  <!-- Left column: Code -->
  <text x="195" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8B949E">CÓDIGO DEL SERVER</text>
  <rect x="40" y="88" width="310" height="310" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>

  <text x="55" y="116" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#58A6FF">import</text>
  <text x="96" y="116" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3"> logging</text>
  <text x="55" y="132" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">logging.</text>
  <text x="100" y="132" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#58A6FF">basicConfig</text>
  <text x="168" y="132" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">(</text>
  <text x="55" y="148" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">    level=logging.</text>
  <text x="168" y="148" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#F0883E">DEBUG</text>
  <text x="55" y="164" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">    stream=sys.</text>
  <text x="141" y="164" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#F0883E">stderr</text>
  <text x="173" y="164" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#8B949E">  ← importante!</text>
  <text x="55" y="180" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">)</text>
  <text x="55" y="196" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">logger = logging.</text>
  <text x="171" y="196" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#58A6FF">getLogger</text>
  <text x="230" y="196" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">(__name__)</text>

  <line x1="55" y1="210" x2="335" y2="210" stroke="#30363D" stroke-width="1"/>

  <text x="55" y="228" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#BC8CFF">@mcp.tool()</text>
  <text x="55" y="244" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#58A6FF">async def</text>
  <text x="113" y="244" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3"> process(query: </text>
  <text x="229" y="244" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#3FB950">str</text>
  <text x="243" y="244" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">,</text>
  <text x="113" y="260" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">             ctx: Context):</text>
  <text x="55" y="280" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#8B949E">    # 1. Log interno (stderr)</text>
  <text x="55" y="296" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">    logger.</text>
  <text x="99" y="296" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#58A6FF">debug</text>
  <text x="127" y="296" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">(f"query={query}")</text>

  <text x="55" y="316" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#8B949E">    # 2. Log visible para el LLM</text>
  <text x="55" y="332" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#58A6FF">    await</text>
  <text x="87" y="332" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3"> ctx.</text>
  <text x="107" y="332" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#3FB950">info</text>
  <text x="124" y="332" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">(f"Processing: {query}")</text>
  <text x="55" y="352" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#58A6FF">    await</text>
  <text x="87" y="352" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3"> ctx.</text>
  <text x="107" y="352" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#BC8CFF">warning</text>
  <text x="154" y="352" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3">("Rate limit near")</text>
  <text x="55" y="372" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#58A6FF">    return</text>
  <text x="99" y="372" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#E6EDF3"> result</text>

  <!-- Right column: Output channels -->
  <text x="615" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8B949E">CANALES DE SALIDA</text>

  <!-- stdout channel -->
  <rect x="380" y="88" width="400" height="96" rx="8" fill="#0E1A10" stroke="#3FB950" stroke-width="1.5"/>
  <text x="400" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#3FB950">stdout — protocolo MCP (JSON-RPC)</text>
  <text x="400" y="130" font-family="Menlo, monospace, sans-serif" font-size="10" fill="#8B949E">{"jsonrpc":"2.0","id":1,"result":{...}}</text>
  <text x="400" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#8B949E">Solo mensajes del protocolo. Nunca mezclar</text>
  <text x="400" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#F0883E">print() aquí — rompe el protocolo.</text>

  <!-- stderr channel -->
  <rect x="380" y="200" width="400" height="96" rx="8" fill="#1A1008" stroke="#F0883E" stroke-width="1.5"/>
  <text x="400" y="222" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#F0883E">stderr — logs del desarrollador</text>
  <text x="400" y="242" font-family="Menlo, monospace, sans-serif" font-size="10" fill="#8B949E">DEBUG:__main__:query=hola mundo</text>
  <text x="400" y="258" font-family="Menlo, monospace, sans-serif" font-size="10" fill="#8B949E">INFO:__main__:Tool called: process</text>
  <text x="400" y="274" font-family="system-ui, sans-serif" font-size="10" fill="#8B949E">Visible con: docker compose logs -f server</text>

  <!-- ctx.info channel -->
  <rect x="380" y="312" width="400" height="84" rx="8" fill="#0D2030" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="400" y="334" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#58A6FF">ctx.info() / ctx.warning() — logs al LLM</text>
  <text x="400" y="354" font-family="system-ui, sans-serif" font-size="10" fill="#8B949E">Enviados como notifications/message al client.</text>
  <text x="400" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#8B949E">El LLM los ve como progreso de la ejecución.</text>
  <text x="400" y="386" font-family="system-ui, sans-serif" font-size="10" fill="#58A6FF">Visible en MCP Inspector → Notifications panel.</text>

  <!-- MCP_LOG_LEVEL note -->
  <rect x="40" y="416" width="740" height="20" rx="4" fill="#140E1E" stroke="#6B4FBB" stroke-width="1"/>
  <text x="410" y="430" text-anchor="middle" font-family="Menlo, monospace, sans-serif" font-size="11" fill="#BC8CFF">MCP_LOG_LEVEL=debug  →  env var para activar logs detallados del SDK</text>
</svg>
