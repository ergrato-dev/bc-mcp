<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460" font-family="system-ui, -apple-system, sans-serif">
  <rect width="820" height="460" fill="#0D1117"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#E6EDF3">Resource Templates — URIs con Variables</text>
  <text x="410" y="56" text-anchor="middle" font-size="13" fill="#8B949E">URI estáticas vs plantillas dinámicas con parámetros {param}</text>

  <!-- LEFT: Static URIs (x=20, w=365, y=74, h=240) -->
  <rect x="20" y="74" width="365" height="240" rx="10" fill="#161B22" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="202" y="97" text-anchor="middle" font-size="12" font-weight="700" fill="#58A6FF">URIs Estáticas</text>
  <text x="202" y="113" text-anchor="middle" font-size="10" fill="#8B949E">@mcp.resource("tasks://all") — URI fija</text>

  <!-- Static examples -->
  <rect x="36" y="126" width="333" height="28" rx="5" fill="#0D1117" stroke="#30363D"/>
  <text x="46" y="142" font-size="10" fill="#F0883E">"tasks://all"</text>
  <text x="140" y="142" font-size="10" fill="#8B949E">→ siempre devuelve lo mismo</text>

  <rect x="36" y="162" width="333" height="28" rx="5" fill="#0D1117" stroke="#30363D"/>
  <text x="46" y="178" font-size="10" fill="#F0883E">"tasks://pending"</text>
  <text x="156" y="178" font-size="10" fill="#8B949E">→ filtrado fijo</text>

  <rect x="36" y="198" width="333" height="28" rx="5" fill="#0D1117" stroke="#30363D"/>
  <text x="46" y="214" font-size="10" fill="#F0883E">"config://settings"</text>
  <text x="166" y="214" font-size="10" fill="#8B949E">→ configuración global</text>

  <!-- Python static code -->
  <rect x="36" y="236" width="333" height="62" rx="5" fill="#0D1117" stroke="#30363D"/>
  <text x="46" y="252" font-size="9" fill="#8B949E"># Python — resource estático</text>
  <text x="46" y="267" font-size="9" fill="#BC8CFF">@mcp.resource(</text>
  <text x="141" y="267" font-size="9" fill="#F0883E">"tasks://all"</text>
  <text x="190" y="267" font-size="9" fill="#BC8CFF">)</text>
  <text x="46" y="282" font-size="9" fill="#BC8CFF">async def</text>
  <text x="100" y="282" font-size="9" fill="#3FB950">all_tasks</text>
  <text x="146" y="282" font-size="9" fill="#E6EDF3">() -> str: ...</text>
  <text x="46" y="291" font-size="9" fill="#8B949E">// TypeScript: server.resource("tasks://all", async () => ...)</text>

  <!-- RIGHT: Template URIs (x=415, w=385, y=74, h=240) -->
  <rect x="415" y="74" width="385" height="240" rx="10" fill="#161B22" stroke="#F0883E" stroke-width="1.5"/>
  <text x="607" y="97" text-anchor="middle" font-size="12" font-weight="700" fill="#F0883E">Resource Templates</text>
  <text x="607" y="113" text-anchor="middle" font-size="10" fill="#8B949E">URIs con variables → un handler para N recursos</text>

  <!-- Template examples -->
  <rect x="431" y="126" width="353" height="28" rx="5" fill="#0D1117" stroke="#30363D"/>
  <text x="441" y="142" font-size="10" fill="#F0883E">"tasks://{id}"</text>
  <text x="524" y="142" font-size="10" fill="#8B949E">→ tarea con id específico</text>

  <rect x="431" y="162" width="353" height="28" rx="5" fill="#0D1117" stroke="#30363D"/>
  <text x="441" y="178" font-size="10" fill="#F0883E">"users://{userId}/tasks"</text>
  <text x="578" y="178" font-size="10" fill="#8B949E">→ tareas por usuario</text>

  <rect x="431" y="198" width="353" height="28" rx="5" fill="#0D1117" stroke="#30363D"/>
  <text x="441" y="214" font-size="10" fill="#F0883E">"docs://{category}/{slug}"</text>
  <text x="594" y="214" font-size="10" fill="#8B949E">→ doc por categoría</text>

  <!-- Python template code -->
  <rect x="431" y="236" width="353" height="62" rx="5" fill="#0D1117" stroke="#30363D"/>
  <text x="441" y="252" font-size="9" fill="#8B949E"># Python — resource template</text>
  <text x="441" y="267" font-size="9" fill="#BC8CFF">@mcp.resource(</text>
  <text x="536" y="267" font-size="9" fill="#F0883E">"tasks://{id}"</text>
  <text x="588" y="267" font-size="9" fill="#BC8CFF">)</text>
  <text x="441" y="282" font-size="9" fill="#BC8CFF">async def</text>
  <text x="495" y="282" font-size="9" fill="#3FB950">get_task</text>
  <text x="535" y="282" font-size="9" fill="#E6EDF3">(id: str) -> str: ...</text>
  <text x="441" y="291" font-size="9" fill="#8B949E">// TS: server.resource("tasks://{id}", { id: z.string() }, ...)</text>

  <!-- Resolution flow (bottom center) -->
  <rect x="20" y="332" width="780" height="112" rx="10" fill="#161B22" stroke="#6B4FBB" stroke-width="1.5"/>
  <text x="410" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#BC8CFF">Flujo de Resolución de Templates</text>

  <!-- Flow steps -->
  <!-- Step 1 -->
  <rect x="36" y="364" width="140" height="64" rx="6" fill="#0D1117" stroke="#58A6FF" stroke-width="1"/>
  <text x="106" y="381" text-anchor="middle" font-size="10" font-weight="700" fill="#58A6FF">1. Cliente pide</text>
  <text x="106" y="396" text-anchor="middle" font-size="9" fill="#F0883E">"tasks://42"</text>
  <text x="106" y="410" text-anchor="middle" font-size="9" fill="#8B949E">resources/read</text>
  <text x="106" y="422" text-anchor="middle" font-size="9" fill="#8B949E">con esa URI</text>

  <!-- Arrow 1→2 -->
  <line x1="176" y1="396" x2="210" y2="396" stroke="#6B4FBB" stroke-width="1.5" marker-end="url(#arrPurple2)"/>

  <!-- Step 2 -->
  <rect x="210" y="364" width="175" height="64" rx="6" fill="#0D1117" stroke="#F0883E" stroke-width="1"/>
  <text x="297" y="381" text-anchor="middle" font-size="10" font-weight="700" fill="#F0883E">2. SDK matchea</text>
  <text x="297" y="396" text-anchor="middle" font-size="9" fill="#E6EDF3">"tasks://42"</text>
  <text x="297" y="410" text-anchor="middle" font-size="9" fill="#8B949E">vs template</text>
  <text x="297" y="422" text-anchor="middle" font-size="9" fill="#F0883E">"tasks://{id}"</text>

  <!-- Arrow 2→3 -->
  <line x1="385" y1="396" x2="419" y2="396" stroke="#6B4FBB" stroke-width="1.5" marker-end="url(#arrPurple2)"/>

  <!-- Step 3 -->
  <rect x="419" y="364" width="175" height="64" rx="6" fill="#0D1117" stroke="#BC8CFF" stroke-width="1"/>
  <text x="506" y="381" text-anchor="middle" font-size="10" font-weight="700" fill="#BC8CFF">3. Extrae param</text>
  <text x="506" y="396" text-anchor="middle" font-size="9" fill="#E6EDF3">id =</text>
  <text x="527" y="396" font-size="9" fill="#3FB950">"42"</text>
  <text x="506" y="410" text-anchor="middle" font-size="9" fill="#8B949E">llama al handler</text>
  <text x="506" y="422" text-anchor="middle" font-size="9" fill="#3FB950">get_task(id="42")</text>

  <!-- Arrow 3→4 -->
  <line x1="594" y1="396" x2="628" y2="396" stroke="#6B4FBB" stroke-width="1.5" marker-end="url(#arrPurple2)"/>

  <!-- Step 4 -->
  <rect x="628" y="364" width="156" height="64" rx="6" fill="#0D1117" stroke="#3FB950" stroke-width="1"/>
  <text x="706" y="381" text-anchor="middle" font-size="10" font-weight="700" fill="#3FB950">4. Devuelve</text>
  <text x="706" y="396" text-anchor="middle" font-size="9" fill="#E6EDF3">contenido de</text>
  <text x="706" y="410" text-anchor="middle" font-size="9" fill="#E6EDF3">la tarea 42</text>
  <text x="706" y="422" text-anchor="middle" font-size="9" fill="#8B949E">como ReadResult</text>

  <defs>
    <marker id="arrPurple2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B4FBB"/>
    </marker>
  </defs>
</svg>
