<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420" font-family="system-ui, -apple-system, sans-serif">
  <rect width="820" height="420" fill="#0D1117"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#E6EDF3">Manejo de Errores en MCP Servers</text>
  <text x="410" y="50" text-anchor="middle" font-size="12" fill="#8B949E">McpError, isError y patrones de retry para BD y APIs</text>

  <!-- Error hierarchy tree (left) -->
  <rect x="20" y="65" width="370" height="230" rx="8" fill="#161B22" stroke="#F0883E" stroke-width="1.5"/>
  <text x="205" y="85" text-anchor="middle" font-size="10" font-weight="700" fill="#F0883E">Jerarquia de Errores MCP (Python)</text>

  <!-- Tree nodes -->
  <rect x="130" y="96" width="150" height="22" rx="4" fill="#21262D" stroke="#8B949E" stroke-width="1"/>
  <text x="205" y="112" text-anchor="middle" font-size="8.5" fill="#8B949E">Exception (Python)</text>

  <line x1="205" y1="118" x2="205" y2="134" stroke="#8B949E" stroke-width="1"/>

  <rect x="110" y="134" width="190" height="22" rx="4" fill="#21262D" stroke="#F0883E" stroke-width="1"/>
  <text x="205" y="150" text-anchor="middle" font-size="8.5" fill="#F0883E">McpError (mcp.shared.exceptions)</text>

  <line x1="165" y1="156" x2="70" y2="172" stroke="#8B949E" stroke-width="1"/>
  <line x1="205" y1="156" x2="205" y2="172" stroke="#8B949E" stroke-width="1"/>
  <line x1="245" y1="156" x2="340" y2="172" stroke="#8B949E" stroke-width="1"/>

  <rect x="30" y="172" width="110" height="22" rx="4" fill="#161B22" stroke="#BC8CFF" stroke-width="1"/>
  <text x="85" y="188" text-anchor="middle" font-size="8" fill="#BC8CFF">INVALID_PARAMS</text>

  <rect x="150" y="172" width="110" height="22" rx="4" fill="#161B22" stroke="#BC8CFF" stroke-width="1"/>
  <text x="205" y="188" text-anchor="middle" font-size="8" fill="#BC8CFF">METHOD_NOT_FOUND</text>

  <rect x="270" y="172" width="110" height="22" rx="4" fill="#161B22" stroke="#BC8CFF" stroke-width="1"/>
  <text x="325" y="188" text-anchor="middle" font-size="8" fill="#BC8CFF">INTERNAL_ERROR</text>

  <text x="35" y="218" font-size="8.5" fill="#8B949E">En tools: retornar isError=True</text>
  <text x="35" y="231" font-size="8.5" fill="#3FB950">return {content: [...], isError: True}</text>
  <text x="35" y="244" font-size="8.5" fill="#8B949E">El LLM puede leer el error y decidir</text>
  <text x="35" y="257" font-size="8.5" fill="#8B949E">No interrumpe la sesion MCP</text>
  <text x="35" y="273" font-size="8.5" fill="#8B949E">McpError: interrumpe el protocolo</text>
  <text x="35" y="286" font-size="8.5" fill="#8B949E">Reservar para errores del protocolo</text>

  <!-- Python error pattern -->
  <rect x="20" y="303" width="370" height="100" rx="8" fill="#161B22" stroke="#3FB950" stroke-width="1"/>
  <text x="205" y="322" text-anchor="middle" font-size="10" font-weight="700" fill="#3FB950">Pattern Python — isError en tool</text>
  <text x="35" y="339" font-size="8.5" fill="#BC8CFF">@mcp.tool()</text>
  <text x="35" y="352" font-size="8.5" fill="#BC8CFF">async def </text>
  <text x="80" y="352" font-size="8.5" fill="#3FB950">get_book</text>
  <text x="118" y="352" font-size="8.5" fill="#E6EDF3">(book_id: int) -&gt; str:</text>
  <text x="35" y="365" font-size="8.5" fill="#BC8CFF">  try:</text>
  <text x="35" y="378" font-size="8.5" fill="#E6EDF3">    row = </text>
  <text x="65" y="378" font-size="8.5" fill="#BC8CFF">await </text>
  <text x="91" y="378" font-size="8.5" fill="#E6EDF3">db.execute(SQL, (book_id,))</text>
  <text x="35" y="391" font-size="8.5" fill="#BC8CFF">  except </text>
  <text x="72" y="391" font-size="8.5" fill="#58A6FF">Exception </text>
  <text x="117" y="391" font-size="8.5" fill="#BC8CFF">as </text>
  <text x="130" y="391" font-size="8.5" fill="#E6EDF3">e:</text>
  <text x="35" y="396" font-size="8.5" fill="#8B949E">    return json.dumps({"error":str(e)})</text>

  <!-- TypeScript error section -->
  <rect x="400" y="65" width="400" height="230" rx="8" fill="#161B22" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="600" y="85" text-anchor="middle" font-size="10" font-weight="700" fill="#58A6FF">Patron TypeScript — isError en tool</text>

  <text x="415" y="104" font-size="8.5" fill="#E6EDF3">server.tool(</text>
  <text x="415" y="117" font-size="8.5" fill="#F0883E">  "get_book"</text>
  <text x="460" y="117" font-size="8.5" fill="#E6EDF3">,</text>
  <text x="415" y="130" font-size="8.5" fill="#E6EDF3">  { id: </text>
  <text x="446" y="130" font-size="8.5" fill="#BC8CFF">z.number</text>
  <text x="488" y="130" font-size="8.5" fill="#E6EDF3">() },</text>
  <text x="415" y="143" font-size="8.5" fill="#BC8CFF">  async </text>
  <text x="445" y="143" font-size="8.5" fill="#E6EDF3">({ id }) =&gt; {</text>
  <text x="415" y="156" font-size="8.5" fill="#BC8CFF">    try </text>
  <text x="438" y="156" font-size="8.5" fill="#E6EDF3">{</text>
  <text x="415" y="169" font-size="8.5" fill="#BC8CFF">      const </text>
  <text x="452" y="169" font-size="8.5" fill="#E6EDF3">row = db.prepare(SQL)</text>
  <text x="567" y="169" font-size="8.5" fill="#E6EDF3">.get(id)</text>
  <text x="415" y="182" font-size="8.5" fill="#BC8CFF">      if </text>
  <text x="435" y="182" font-size="8.5" fill="#E6EDF3">(!row) </text>
  <text x="464" y="182" font-size="8.5" fill="#BC8CFF">return </text>
  <text x="493" y="182" font-size="8.5" fill="#E6EDF3">{</text>
  <text x="415" y="195" font-size="8.5" fill="#E6EDF3">        content: [{type:</text>
  <text x="522" y="195" font-size="8.5" fill="#F0883E">"text"</text>
  <text x="548" y="195" font-size="8.5" fill="#E6EDF3">, text:</text>
  <text x="415" y="208" font-size="8.5" fill="#F0883E">          "Book not found"</text>
  <text x="506" y="208" font-size="8.5" fill="#E6EDF3">}],</text>
  <text x="415" y="221" font-size="8.5" fill="#3FB950">        isError: </text>
  <text x="466" y="221" font-size="8.5" fill="#F0883E">true</text>
  <text x="484" y="221" font-size="8.5" fill="#E6EDF3">}</text>
  <text x="415" y="234" font-size="8.5" fill="#E6EDF3">      ...</text>
  <text x="415" y="254" font-size="8.5" fill="#8B949E">isError: true = el LLM lo lee y decide</text>
  <text x="415" y="268" font-size="8.5" fill="#8B949E">el server MCP sigue corriendo</text>
  <text x="415" y="282" font-size="8.5" fill="#3FB950">Preferir isError sobre throw en tools</text>

  <!-- Retry patterns -->
  <rect x="400" y="303" width="400" height="100" rx="8" fill="#161B22" stroke="#BC8CFF" stroke-width="1"/>
  <text x="600" y="322" text-anchor="middle" font-size="10" font-weight="700" fill="#BC8CFF">Patron Retry para APIs externas</text>
  <text x="415" y="340" font-size="8.5" fill="#BC8CFF">for </text>
  <text x="432" y="340" font-size="8.5" fill="#E6EDF3">attempt </text>
  <text x="472" y="340" font-size="8.5" fill="#BC8CFF">in </text>
  <text x="483" y="340" font-size="8.5" fill="#E6EDF3">range(</text>
  <text x="510" y="340" font-size="8.5" fill="#F0883E">3</text>
  <text x="516" y="340" font-size="8.5" fill="#E6EDF3">):  </text>
  <text x="532" y="340" font-size="8.5" fill="#8B949E"># max 3 intentos</text>
  <text x="415" y="353" font-size="8.5" fill="#BC8CFF">  try:</text>
  <text x="415" y="366" font-size="8.5" fill="#BC8CFF">    return await </text>
  <text x="487" y="366" font-size="8.5" fill="#3FB950">call_api</text>
  <text x="527" y="366" font-size="8.5" fill="#E6EDF3">(...)</text>
  <text x="415" y="379" font-size="8.5" fill="#BC8CFF">  except </text>
  <text x="452" y="379" font-size="8.5" fill="#58A6FF">httpx.TimeoutException</text>
  <text x="556" y="379" font-size="8.5" fill="#E6EDF3">:</text>
  <text x="415" y="392" font-size="8.5" fill="#BC8CFF">    await </text>
  <text x="447" y="392" font-size="8.5" fill="#E6EDF3">asyncio.sleep(</text>
  <text x="512" y="392" font-size="8.5" fill="#F0883E">2 ** attempt</text>
  <text x="562" y="392" font-size="8.5" fill="#E6EDF3">)</text>

  <!-- Footer -->
  <rect x="20" y="410" width="780" height="8" rx="4" fill="#161B22"/>
  <text x="410" y="417" text-anchor="middle" font-size="7.5" fill="#8B949E">isError=True/true: herramienta ejecuto pero fallo — el LLM ve el error | McpError: error del protocolo MCP</text>
</svg>
