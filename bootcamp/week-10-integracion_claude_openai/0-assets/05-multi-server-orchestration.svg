<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520" font-family="system-ui, -apple-system, Roboto, sans-serif">

  <!-- Background -->
  <rect width="860" height="520" fill="#111827"/>

  <!-- Title -->
  <text x="430" y="30" font-size="19" font-weight="bold" fill="#f9fafb" text-anchor="middle">Orquestación Multi-Server MCP</text>
  <text x="430" y="50" font-size="11" fill="#6b7280" text-anchor="middle">Un agente conectado a múltiples MCP servers simultáneamente</text>

  <!-- Arrowheads -->
  <defs>
    <marker id="msarr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="msarr-rev" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- ══════════════ AGENT (CENTER) ══════════════ -->
  <rect x="305" y="158" width="250" height="80" rx="10" fill="#3b0764" stroke="#a855f7" stroke-width="2"/>
  <text x="430" y="186" font-size="15" font-weight="bold" fill="#c084fc" text-anchor="middle">Agente Claude</text>
  <text x="430" y="207" font-size="10" fill="#d8b4fe" text-anchor="middle">anthropic.messages.create(</text>
  <text x="430" y="222" font-size="10" fill="#d8b4fe" text-anchor="middle">tools=all_tools_combined)</text>

  <!-- ══════════════ SERVER 1: Library Server (left) ══════════════ -->
  <rect x="20" y="148" width="218" height="100" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="129" y="170" font-size="12" font-weight="bold" fill="#86efac" text-anchor="middle">Library Server</text>
  <text x="129" y="186" font-size="9" fill="#6ee7b7" text-anchor="middle">python server.py (semana 07)</text>
  <line x1="30" y1="192" x2="228" y2="192" stroke="#166534" stroke-width="0.5"/>
  <text x="129" y="207" font-size="9" fill="#a7f3d0" text-anchor="middle">search_books · add_book</text>
  <text x="129" y="221" font-size="9" fill="#a7f3d0" text-anchor="middle">get_book · update_book</text>
  <text x="129" y="235" font-size="9" fill="#a7f3d0" text-anchor="middle">delete_book · enrich_book</text>

  <!-- Connection: Library → Agent (bidirectional) -->
  <line x1="238" y1="198" x2="304" y2="198" stroke="#4b5563" stroke-width="2" marker-end="url(#msarr)"/>
  <line x1="304" y1="206" x2="238" y2="206" stroke="#4b5563" stroke-width="2" marker-end="url(#msarr)"/>
  <text x="271" y="196" font-size="9" fill="#4b5563" text-anchor="middle">stdio</text>

  <!-- ══════════════ SERVER 2: Calculator Server (top-right) ══════════════ -->
  <rect x="530" y="60" width="218" height="90" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="639" y="82" font-size="12" font-weight="bold" fill="#93c5fd" text-anchor="middle">Calculator Server</text>
  <text x="639" y="98" font-size="9" fill="#7dd3fc" text-anchor="middle">python calc_server.py</text>
  <line x1="540" y1="104" x2="738" y2="104" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="639" y="118" font-size="9" fill="#bfdbfe" text-anchor="middle">add · subtract · multiply</text>
  <text x="639" y="132" font-size="9" fill="#bfdbfe" text-anchor="middle">divide · power · sqrt</text>

  <!-- Connection: Agent → Calculator (bidirectional) -->
  <line x1="555" y1="160" x2="532" y2="140" stroke="#4b5563" stroke-width="2" marker-end="url(#msarr)"/>
  <line x1="540" y1="152" x2="563" y2="172" stroke="#4b5563" stroke-width="2" marker-end="url(#msarr)"/>
  <text x="532" y="148" font-size="9" fill="#4b5563" text-anchor="end">stdio</text>

  <!-- ══════════════ SERVER 3: Docs / API Server (bottom-right) ══════════════ -->
  <rect x="530" y="260" width="218" height="90" rx="8" fill="#4a1942" stroke="#c084fc" stroke-width="1.5"/>
  <text x="639" y="282" font-size="12" font-weight="bold" fill="#e879f9" text-anchor="middle">Docs / Web Server</text>
  <text x="639" y="298" font-size="9" fill="#f0abfc" text-anchor="middle">python docs_server.py</text>
  <line x1="540" y1="304" x2="738" y2="304" stroke="#4a1942" stroke-width="0.5"/>
  <text x="639" y="318" font-size="9" fill="#f5d0fe" text-anchor="middle">fetch_url · search_web</text>
  <text x="639" y="332" font-size="9" fill="#f5d0fe" text-anchor="middle">get_docs · parse_html</text>

  <!-- Connection: Agent → Docs (bidirectional) -->
  <line x1="555" y1="238" x2="532" y2="262" stroke="#4b5563" stroke-width="2" marker-end="url(#msarr)"/>
  <line x1="540" y1="258" x2="563" y2="234" stroke="#4b5563" stroke-width="2" marker-end="url(#msarr)"/>
  <text x="534" y="258" font-size="9" fill="#4b5563" text-anchor="end">stdio</text>

  <!-- ══════════════ TOOL REGISTRY (below agent) ══════════════ -->
  <rect x="305" y="270" width="250" height="68" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="430" y="288" font-size="11" font-weight="bold" fill="#9ca3af" text-anchor="middle">Registro Unificado de Tools</text>
  <text x="430" y="304" font-size="9" fill="#6b7280" text-anchor="middle">all_tools = library_tools + calc_tools + docs_tools</text>
  <text x="430" y="320" font-size="9" fill="#6b7280" text-anchor="middle">all_sessions = {name: session for each server}</text>
  <text x="430" y="335" font-size="9" fill="#6b7280" text-anchor="middle">dispatch: all_sessions[tool_server].call_tool(...)</text>

  <!-- Arrow: Agent → Registry -->
  <line x1="430" y1="238" x2="430" y2="268" stroke="#374151" stroke-width="1.5" marker-end="url(#msarr)"/>

  <!-- ══════════════ USER (bottom center) ══════════════ -->
  <rect x="355" y="368" width="150" height="40" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="430" y="384" font-size="12" font-weight="bold" fill="#93c5fd" text-anchor="middle">Usuario</text>
  <text x="430" y="400" font-size="9" fill="#bfdbfe" text-anchor="middle">prompt o CLI</text>

  <!-- Arrow: User → Agent -->
  <line x1="430" y1="366" x2="430" y2="340" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#msarr)"/>

  <!-- ══════════════ HOW IT WORKS (left panel) ══════════════ -->
  <rect x="10" y="285" width="277" height="115" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="148" y="302" font-size="11" font-weight="bold" fill="#9ca3af" text-anchor="middle">Cómo funciona el routing</text>
  <text x="20" y="320" font-size="9" fill="#6b7280">1. Claude decide qué tool usar</text>
  <text x="20" y="336" font-size="9" fill="#6b7280">2. tool_name → identifica el server origen</text>
  <text x="20" y="352" font-size="9" fill="#6b7280">3. all_sessions[server].call_tool(name, args)</text>
  <text x="20" y="368" font-size="9" fill="#6b7280">4. Resultado devuelto como tool_result</text>
  <text x="20" y="384" font-size="9" fill="#6b7280">5. Loop continúa hasta end_turn</text>

  <!-- ══════════════ FOOTER ══════════════ -->
  <line x1="10" y1="425" x2="850" y2="425" stroke="#1f2937" stroke-width="1"/>
  <text x="430" y="444" font-size="10" fill="#4b5563" text-anchor="middle">Cada server se conecta con stdio_client() independiente — pueden estar en procesos/máquinas distintos</text>
  <text x="430" y="462" font-size="10" fill="#4b5563" text-anchor="middle">El agente no necesita saber la arquitectura interna de cada server — solo el nombre y los argumentos de la tool</text>
  <text x="430" y="480" font-size="10" fill="#4b5563" text-anchor="middle">Prefijo opcional: "library__search_books" para evitar colisiones de nombres entre servers</text>

</svg>
