<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="800" height="520" fill="#0f0f17" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">TypeScript MCP SDK — Arquitectura de Capas</text>
  <text x="400" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">Cómo se organizan los módulos del cliente TypeScript</text>

  <!-- Layer 1: Tu código -->
  <rect x="60" y="80" width="680" height="64" fill="#1e1b4b" rx="8" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">Tu Aplicación TypeScript</text>
  <text x="400" y="128" text-anchor="middle" fill="#c7d2fe" font-size="11">import { Client } from "@modelcontextprotocol/sdk/client/index.js"</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="144" x2="400" y2="162" stroke="#475569" stroke-width="2"/>
  <polygon points="400,162 395,152 405,152" fill="#475569"/>

  <!-- Layer 2: Client class -->
  <rect x="60" y="162" width="680" height="64" fill="#172554" rx="8" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Client  ·  @modelcontextprotocol/sdk/client/index.js</text>
  <text x="400" y="210" text-anchor="middle" fill="#bfdbfe" font-size="11">connect()  ·  listTools()  ·  callTool()  ·  listResources()  ·  readResource()  ·  close()</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="226" x2="400" y2="244" stroke="#475569" stroke-width="2"/>
  <polygon points="400,244 395,234 405,234" fill="#475569"/>

  <!-- Layer 3: Transport -->
  <rect x="60" y="244" width="680" height="64" fill="#0c2340" rx="8" stroke="#0ea5e9" stroke-width="2"/>
  <text x="400" y="272" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">StdioClientTransport  ·  @modelcontextprotocol/sdk/client/stdio.js</text>
  <text x="400" y="292" text-anchor="middle" fill="#bae6fd" font-size="11">command · args · env  →  spawn proceso hijo  →  stdin/stdout pipes</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="308" x2="400" y2="326" stroke="#475569" stroke-width="2"/>
  <polygon points="400,326 395,316 405,316" fill="#475569"/>

  <!-- Layer 4: JSON-RPC / Protocol -->
  <rect x="60" y="326" width="680" height="64" fill="#0a1628" rx="8" stroke="#6b7280" stroke-width="2"/>
  <text x="400" y="354" text-anchor="middle" fill="#9ca3af" font-size="13" font-weight="700">Protocolo MCP  ·  JSON-RPC 2.0</text>
  <text x="400" y="374" text-anchor="middle" fill="#d1d5db" font-size="11">initialize  ·  tools/list  ·  tools/call  ·  resources/list  ·  resources/read</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="390" x2="400" y2="408" stroke="#475569" stroke-width="2"/>
  <polygon points="400,408 395,398 405,398" fill="#475569"/>

  <!-- Layer 5: Server process -->
  <rect x="60" y="408" width="680" height="64" fill="#0f1a0a" rx="8" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="436" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">MCP Server (proceso hijo)  ·  Python / TypeScript</text>
  <text x="400" y="456" text-anchor="middle" fill="#bbf7d0" font-size="11">Lee stdin  ·  Procesa JSON-RPC  ·  Responde por stdout  ·  Errores por stderr</text>

  <!-- Side labels -->
  <text x="36" y="115" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="700" transform="rotate(-90, 36, 115)">USUARIO</text>
  <text x="36" y="195" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="700" transform="rotate(-90, 36, 195)">SDK</text>
  <text x="36" y="277" text-anchor="middle" fill="#0ea5e9" font-size="10" font-weight="700" transform="rotate(-90, 36, 277)">TRANSPORT</text>
  <text x="36" y="360" text-anchor="middle" fill="#6b7280" font-size="10" font-weight="700" transform="rotate(-90, 36, 360)">PROTOCOLO</text>
  <text x="36" y="442" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700" transform="rotate(-90, 36, 442)">SERVER</text>

  <!-- Footer -->
  <text x="400" y="505" text-anchor="middle" fill="#475569" font-size="10">@modelcontextprotocol/sdk 1.10.2  ·  Node.js 22+  ·  TypeScript 5.x</text>
</svg>
