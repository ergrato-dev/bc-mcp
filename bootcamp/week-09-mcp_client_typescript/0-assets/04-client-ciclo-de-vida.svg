<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" width="760" height="620" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="760" height="620" fill="#0f0f17" rx="12"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700">Línea de Tiempo — Ciclo de vida del Client</text>
  <text x="380" y="54" text-anchor="middle" fill="#94a3b8" font-size="11">Desde la creación hasta el cierre de conexión</text>

  <!-- Timeline spine -->
  <line x1="120" y1="80" x2="120" y2="580" stroke="#334155" stroke-width="3"/>

  <!-- Step 1: new Client() + new StdioClientTransport() -->
  <circle cx="120" cy="100" r="12" fill="#6366f1" stroke="#818cf8" stroke-width="2"/>
  <text x="120" y="105" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">1</text>
  <rect x="148" y="80" width="580" height="40" fill="#1e1b4b" rx="6" stroke="#6366f1" stroke-width="1"/>
  <text x="168" y="97" fill="#a5b4fc" font-size="12" font-weight="700">Instanciar Client + Transport</text>
  <text x="168" y="113" fill="#818cf8" font-size="10">const transport = new StdioClientTransport({ command, args, env })</text>

  <!-- vertical line segment -->
  <line x1="120" y1="120" x2="120" y2="160" stroke="#334155" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 2: connect() -->
  <circle cx="120" cy="168" r="12" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="120" y="173" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">2</text>
  <rect x="148" y="148" width="580" height="40" fill="#172554" rx="6" stroke="#3b82f6" stroke-width="1"/>
  <text x="168" y="165" fill="#93c5fd" font-size="12" font-weight="700">await client.connect(transport)</text>
  <text x="168" y="181" fill="#60a5fa" font-size="10">Spawns servidor  ·  JSON-RPC initialize  ·  Handshake MCP completado</text>

  <line x1="120" y1="188" x2="120" y2="228" stroke="#334155" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 3: listTools / listResources -->
  <circle cx="120" cy="236" r="12" fill="#22c55e" stroke="#4ade80" stroke-width="2"/>
  <text x="120" y="241" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">3</text>
  <rect x="148" y="216" width="580" height="40" fill="#052e16" rx="6" stroke="#22c55e" stroke-width="1"/>
  <text x="168" y="233" fill="#86efac" font-size="12" font-weight="700">Discovery — listTools() / listResources() / listPrompts()</text>
  <text x="168" y="249" fill="#4ade80" font-size="10">Retornan arrays tipados: Tool[], Resource[], Prompt[]</text>

  <line x1="120" y1="256" x2="120" y2="296" stroke="#334155" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 4: callTool() -->
  <circle cx="120" cy="304" r="12" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>
  <text x="120" y="309" text-anchor="middle" fill="#0f0f17" font-size="9" font-weight="700">4</text>
  <rect x="148" y="284" width="580" height="56" fill="#1a1200" rx="6" stroke="#f59e0b" stroke-width="1"/>
  <text x="168" y="301" fill="#fcd34d" font-size="12" font-weight="700">await client.callTool({ name, arguments })</text>
  <text x="168" y="317" fill="#fbbf24" font-size="10">result.content[0].type  →  'text' | 'image' | 'resource'</text>
  <text x="168" y="333" fill="#fbbf24" font-size="10">result.isError → true si el server reportó un error de dominio</text>

  <line x1="120" y1="340" x2="120" y2="380" stroke="#334155" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 5: readResource() -->
  <circle cx="120" cy="388" r="12" fill="#f59e0b" stroke="#fbbf24" stroke-width="2"/>
  <text x="120" y="393" text-anchor="middle" fill="#0f0f17" font-size="9" font-weight="700">5</text>
  <rect x="148" y="368" width="580" height="40" fill="#1a1200" rx="6" stroke="#f59e0b" stroke-width="1"/>
  <text x="168" y="385" fill="#fcd34d" font-size="12" font-weight="700">await client.readResource({ uri: "db://books/stats" })</text>
  <text x="168" y="401" fill="#fbbf24" font-size="10">result.contents[0].text  ·  URI estilo scheme://path</text>

  <line x1="120" y1="408" x2="120" y2="448" stroke="#334155" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 6: Error -->
  <circle cx="120" cy="456" r="12" fill="#ef4444" stroke="#f87171" stroke-width="2"/>
  <text x="120" y="461" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">!</text>
  <rect x="148" y="436" width="580" height="40" fill="#1a0a0a" rx="6" stroke="#ef4444" stroke-width="1"/>
  <text x="168" y="453" fill="#fca5a5" font-size="12" font-weight="700">Error — McpError  ·  Timeout  ·  BrokenPipe</text>
  <text x="168" y="469" fill="#f87171" font-size="10">catch (e)  →  if (e instanceof McpError)  ·  e.code, e.message</text>

  <line x1="120" y1="476" x2="120" y2="516" stroke="#334155" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 7: close() -->
  <circle cx="120" cy="524" r="12" fill="#64748b" stroke="#94a3b8" stroke-width="2"/>
  <text x="120" y="529" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">7</text>
  <rect x="148" y="504" width="580" height="40" fill="#0f172a" rx="6" stroke="#64748b" stroke-width="1"/>
  <text x="168" y="521" fill="#cbd5e1" font-size="12" font-weight="700">await client.close()</text>
  <text x="168" y="537" fill="#94a3b8" font-size="10">Termina proceso hijo  ·  Cierra streams  ·  Libera recursos</text>

  <!-- Footer -->
  <text x="380" y="590" text-anchor="middle" fill="#475569" font-size="10">Usar try / finally para garantizar client.close() incluso ante errores</text>
</svg>
