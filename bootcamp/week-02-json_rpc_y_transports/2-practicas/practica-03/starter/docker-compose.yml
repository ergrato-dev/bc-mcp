services:
  mcp-server-python:
    build:
      context: ./python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

  mcp-inspector:
    image: node:22-slim
    working_dir: /app
    ports:
      - "6274:6274"
    command: >
      sh -c "npx --yes @modelcontextprotocol/inspector --port 6274"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
