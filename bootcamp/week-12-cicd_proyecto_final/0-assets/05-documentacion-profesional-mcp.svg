<svg viewBox="0 0 880 520"
  xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <rect width="880" height="520" fill="#111827"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f9fafb">Documentación Profesional de Proyectos MCP</text>
  <text x="440" y="58" text-anchor="middle" font-size="12" fill="#6b7280">README.md — secciones obligatorias para un proyecto MCP listo para producción</text>

  <!-- README mock -->
  <rect x="30" y="75" width="380" height="425" rx="10" fill="#161b22" stroke="#30363d" stroke-width="2"/>

  <!-- Badges row -->
  <rect x="50" y="92" width="80" height="18" rx="4" fill="#22c55e"/>
  <text x="90" y="105" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">CI: passing</text>
  <rect x="138" y="92" width="90" height="18" rx="4" fill="#0ea5e9"/>
  <text x="183" y="105" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">coverage: 87%</text>
  <rect x="236" y="92" width="80" height="18" rx="4" fill="#a855f7"/>
  <text x="276" y="105" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Docker: latest</text>

  <!-- Title mock -->
  <text x="50" y="135" font-size="17" font-weight="800" fill="#e6edf3"># MCP Library Server</text>

  <text x="50" y="158" font-size="11" fill="#8b949e">Servidor MCP completo para gestión de biblioteca con</text>
  <text x="50" y="173" font-size="11" fill="#8b949e">integración a OpenLibrary API y cliente LLM con Claude.</text>

  <!-- Architecture diagram placeholder -->
  <rect x="50" y="186" width="340" height="60" rx="6" fill="#0d1117" stroke="#374151"/>
  <text x="220" y="220" text-anchor="middle" font-size="11" fill="#4b5563">[ diagrama de arquitectura SVG ]</text>

  <!-- Install section -->
  <text x="50" y="270" font-size="13" font-weight="700" fill="#e6edf3">## 🚀 Instalación rápida</text>
  <rect x="50" y="282" width="340" height="55" rx="4" fill="#0d1117"/>
  <text x="65" y="300" font-size="10" fill="#6b7280" font-family="monospace">$ git clone https://github.com/user/mcp-server</text>
  <text x="65" y="316" font-size="10" fill="#6b7280" font-family="monospace">$ cp .env.example .env  # editar variables</text>
  <text x="65" y="332" font-size="10" fill="#a5d6ff" font-family="monospace">$ docker compose up --build</text>

  <!-- Usage section -->
  <text x="50" y="360" font-size="13" font-weight="700" fill="#e6edf3">## 💬 Ejemplo de uso</text>
  <rect x="50" y="372" width="340" height="60" rx="4" fill="#0d1117"/>
  <text x="65" y="390" font-size="10" fill="#6b7280" font-family="monospace">$ uv run python client.py</text>
  <text x="65" y="406" font-size="10" fill="#4ade80" font-family="monospace">&gt; Busca libros de García Márquez</text>
  <text x="65" y="422" font-size="10" fill="#e6edf3" font-family="monospace">Encontré 3 libros: Cien Años...</text>

  <!-- Footer links -->
  <text x="50" y="456" font-size="11" fill="#8b949e">📄 Licencia MIT · 🤝 Contribuciones bienvenidas</text>
  <text x="50" y="472" font-size="11" fill="#8b949e">📚 MCP Spec · Python SDK · TypeScript SDK</text>
  <text x="50" y="488" font-size="11" fill="#4b5563">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <!-- Right column: sections checklist -->
  <rect x="440" y="75" width="410" height="425" rx="10" fill="#0d1117" stroke="#374151" stroke-width="2"/>
  <text x="645" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#f9fafb">Secciones obligatorias</text>

  <!-- Section items -->
  <rect x="460" y="115" width="370" height="38" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.2"/>
  <text x="480" y="130" font-size="12" font-weight="700" fill="#4ade80">1. Badges de estado</text>
  <text x="480" y="146" font-size="10" fill="#94a3b8">CI, coverage, Docker, Python version</text>

  <rect x="460" y="160" width="370" height="38" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="480" y="175" font-size="12" font-weight="700" fill="#93c5fd">2. Descripción y propósito</text>
  <text x="480" y="191" font-size="10" fill="#94a3b8">Qué problema resuelve, herramientas MCP incluidas</text>

  <rect x="460" y="205" width="370" height="38" rx="6" fill="#1a1a0a" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="480" y="220" font-size="12" font-weight="700" fill="#fbbf24">3. Diagrama de arquitectura</text>
  <text x="480" y="236" font-size="10" fill="#94a3b8">SVG o imagen del sistema completo</text>

  <rect x="460" y="250" width="370" height="38" rx="6" fill="#0f1f0f" stroke="#22c55e" stroke-width="1.2"/>
  <text x="480" y="265" font-size="12" font-weight="700" fill="#4ade80">4. Instalación rápida</text>
  <text x="480" y="281" font-size="10" fill="#94a3b8">Docker (método principal) + local setup</text>

  <rect x="460" y="295" width="370" height="38" rx="6" fill="#1f0a2a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="480" y="310" font-size="12" font-weight="700" fill="#c084fc">5. Variables de entorno</text>
  <text x="480" y="326" font-size="10" fill="#94a3b8">Tabla: nombre · descripción · valor por defecto</text>

  <rect x="460" y="340" width="370" height="38" rx="6" fill="#0a1628" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="480" y="355" font-size="12" font-weight="700" fill="#22d3ee">6. Tools / Resources MCP</text>
  <text x="480" y="371" font-size="10" fill="#94a3b8">Tabla con nombre, descripción y parámetros</text>

  <rect x="460" y="385" width="370" height="38" rx="6" fill="#2a0a0a" stroke="#f87171" stroke-width="1.2"/>
  <text x="480" y="400" font-size="12" font-weight="700" fill="#f87171">7. Ejemplo de uso</text>
  <text x="480" y="416" font-size="10" fill="#94a3b8">Código del client + output esperado</text>

  <rect x="460" y="430" width="370" height="55" rx="6" fill="#111827" stroke="#374151" stroke-width="1.2"/>
  <text x="480" y="449" font-size="11" font-weight="600" fill="#e2e8f0">8. Licencia · Contribución · Referencias</text>
  <text x="480" y="466" font-size="10" fill="#94a3b8">MIT License, CONTRIBUTING.md, enlaces a MCP Spec,</text>
  <text x="480" y="480" font-size="10" fill="#94a3b8">Python SDK y TypeScript SDK.</text>
</svg>
