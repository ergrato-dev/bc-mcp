<svg viewBox="0 0 880 540"
  xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <rect width="880" height="540" fill="#111827"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#f9fafb">Arquitectura de Sistema MCP en Producción</text>
  <text x="440" y="58" text-anchor="middle" font-size="12" fill="#6b7280">MCP Server + Client + LLM + CI/CD + Docker — capstone project</text>

  <!-- ===== LEFT COLUMN: Developer side ===== -->
  <!-- Developer -->
  <rect x="20" y="80" width="120" height="60" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="80" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#e2e8f0">Desarrollador</text>
  <text x="80" y="122" text-anchor="middle" font-size="10" fill="#94a3b8">git push / tag</text>

  <!-- git push arrow down -->
  <line x1="80" y1="140" x2="80" y2="170" stroke="#374151" stroke-width="1.5"/>
  <polygon points="76,168 80,178 84,168" fill="#374151"/>

  <!-- GitHub -->
  <rect x="20" y="178" width="120" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="80" y="202" text-anchor="middle" font-size="22" fill="#f0f6fc">●</text>
  <text x="80" y="222" text-anchor="middle" font-size="10" fill="#8b949e">github.com</text>

  <!-- trigger arrow -->
  <line x1="80" y1="238" x2="80" y2="268" stroke="#374151" stroke-width="1.5"/>
  <polygon points="76,266 80,276 84,266" fill="#374151"/>

  <!-- GitHub Actions -->
  <rect x="20" y="276" width="120" height="60" rx="8" fill="#1a1a0a" stroke="#fbbf24" stroke-width="2"/>
  <text x="80" y="298" text-anchor="middle" font-size="10" font-weight="700" fill="#fbbf24">GitHub Actions</text>
  <text x="80" y="314" text-anchor="middle" font-size="9" fill="#94a3b8">lint → test → build</text>
  <text x="80" y="328" text-anchor="middle" font-size="9" fill="#94a3b8">push → deploy</text>

  <!-- push to GHCR arrow -->
  <line x1="140" y1="306" x2="200" y2="306" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="198,302 208,306 198,310" fill="#374151"/>

  <!-- ===== CENTER: Infrastructure ===== -->
  <!-- GHCR -->
  <rect x="208" y="276" width="130" height="60" rx="8" fill="#0a1628" stroke="#22d3ee" stroke-width="2"/>
  <text x="273" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#22d3ee">GHCR</text>
  <text x="273" y="316" text-anchor="middle" font-size="9" fill="#94a3b8">ghcr.io/user/</text>
  <text x="273" y="330" text-anchor="middle" font-size="9" fill="#94a3b8">mcp-server:v1.2.3</text>

  <!-- pull image arrow -->
  <line x1="338" y1="306" x2="398" y2="306" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="396,302 406,306 396,310" fill="#374151"/>

  <!-- ===== RIGHT: Production ===== -->
  <!-- Docker Compose / Production box -->
  <rect x="400" y="80" width="460" height="430" rx="12" fill="#0d1117" stroke="#22c55e" stroke-width="2"/>
  <text x="630" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">docker compose up (Producción)</text>

  <!-- MCP Server -->
  <rect x="420" y="118" width="185" height="100" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="512" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#4ade80">MCP Server</text>
  <text x="512" y="160" text-anchor="middle" font-size="10" fill="#94a3b8">Python (FastMCP)</text>
  <text x="512" y="176" text-anchor="middle" font-size="10" fill="#94a3b8">Tools / Resources / Prompts</text>
  <text x="512" y="192" text-anchor="middle" font-size="10" fill="#94a3b8">SQLite / HTTP APIs</text>
  <text x="512" y="208" text-anchor="middle" font-size="9" fill="#6b7280">:8000 (HTTP+SSE)</text>

  <!-- MCP Client + LLM -->
  <rect x="635" y="118" width="210" height="100" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="740" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#93c5fd">MCP Client + LLM</text>
  <text x="740" y="160" text-anchor="middle" font-size="10" fill="#94a3b8">Python / TypeScript</text>
  <text x="740" y="176" text-anchor="middle" font-size="10" fill="#94a3b8">Claude / OpenAI API</text>
  <text x="740" y="192" text-anchor="middle" font-size="10" fill="#94a3b8">Agentic loop</text>
  <text x="740" y="208" text-anchor="middle" font-size="9" fill="#6b7280">llm.tools_call → mcp.tool()</text>

  <!-- Arrow Server ↔ Client -->
  <line x1="605" y1="168" x2="633" y2="168" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="631,164 641,168 631,172" fill="#94a3b8"/>
  <polygon points="607,164 597,168 607,172" fill="#94a3b8"/>
  <text x="619" y="162" text-anchor="middle" font-size="9" fill="#6b7280">MCP</text>

  <!-- Database -->
  <rect x="420" y="240" width="120" height="65" rx="8" fill="#1a1a0a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="480" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">Database</text>
  <text x="480" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">SQLite</text>
  <text x="480" y="294" text-anchor="middle" font-size="9" fill="#6b7280">volume → /data</text>

  <!-- Env vars -->
  <rect x="560" y="240" width="120" height="65" rx="8" fill="#1f0a2a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="620" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#c084fc">Secrets</text>
  <text x="620" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">ANTHROPIC_KEY</text>
  <text x="620" y="294" text-anchor="middle" font-size="9" fill="#6b7280">.env → env_file:</text>

  <!-- External APIs -->
  <rect x="700" y="240" width="145" height="65" rx="8" fill="#2a0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="772" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#f87171">APIs Externas</text>
  <text x="772" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">OpenLibrary, etc.</text>
  <text x="772" y="294" text-anchor="middle" font-size="9" fill="#6b7280">timeout + retry</text>

  <!-- Healthcheck -->
  <rect x="420" y="328" width="430" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="635" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#e2e8f0">healthcheck + depends_on + restart: unless-stopped</text>
  <text x="635" y="368" text-anchor="middle" font-size="10" fill="#6b7280">docker compose mantiene los servicios activos y en el orden correcto</text>

  <!-- README professional -->
  <rect x="420" y="392" width="430" height="100" rx="8" fill="#1e2a1e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="635" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#4ade80">README Profesional</text>
  <text x="440" y="436" font-size="10" fill="#94a3b8">■ Badges CI/CD · arquitectura · demo GIF</text>
  <text x="440" y="452" font-size="10" fill="#94a3b8">■ Guía de instalación (Docker) · variables de entorno</text>
  <text x="440" y="468" font-size="10" fill="#94a3b8">■ Ejemplos de uso con el client MCP</text>
  <text x="440" y="484" font-size="10" fill="#94a3b8">■ Contribución · licencia · referencias a MCP spec</text>
</svg>
