<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="820" height="480" fill="#0D1117"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#E6EDF3">Anatomía de un MCP Server en TypeScript</text>
  <text x="410" y="58" text-anchor="middle" font-size="13" fill="#8B949E">McpServer + StdioServerTransport + server.tool()</text>

  <!-- ── Layer 1: LLM Client ── -->
  <rect x="30" y="85" width="180" height="80" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <text x="120" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#BC8CFF">LLM Client</text>
  <text x="120" y="133" text-anchor="middle" font-size="11" fill="#8B949E">Claude / ChatGPT</text>
  <text x="120" y="151" text-anchor="middle" font-size="11" fill="#8B949E">MCP Inspector</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="125" x2="255" y2="125" stroke="#58A6FF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="232" y="115" text-anchor="middle" font-size="9" fill="#58A6FF">JSON-RPC</text>
  <text x="232" y="139" text-anchor="middle" font-size="9" fill="#58A6FF">stdio</text>

  <!-- ── Layer 2: Transport ── -->
  <rect x="257" y="85" width="200" height="80" rx="10" fill="#161B22" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="357" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#58A6FF">StdioServerTransport</text>
  <text x="357" y="130" text-anchor="middle" font-size="10" fill="#8B949E">stdin → parse JSON-RPC</text>
  <text x="357" y="148" text-anchor="middle" font-size="10" fill="#8B949E">stdout ← serialize response</text>

  <!-- Arrow 2 -->
  <line x1="457" y1="125" x2="502" y2="125" stroke="#6B4FBB" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="479" y="118" text-anchor="middle" font-size="9" fill="#6B4FBB">connect</text>

  <!-- ── Layer 3: McpServer ── -->
  <rect x="504" y="70" width="280" height="380" rx="10" fill="#161B22" stroke="#BC8CFF" stroke-width="2"/>
  <text x="644" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#BC8CFF">McpServer</text>
  <text x="644" y="118" text-anchor="middle" font-size="10" fill="#8B949E">@modelcontextprotocol/sdk</text>

  <!-- Tool boxes -->
  <rect x="524" y="135" width="240" height="54" rx="7" fill="#0D1117" stroke="#3FB950" stroke-width="1.5"/>
  <text x="644" y="157" text-anchor="middle" font-size="11" font-weight="700" fill="#3FB950">server.tool("add", ...)</text>
  <text x="644" y="177" text-anchor="middle" font-size="10" fill="#8B949E">{ a: z.number(), b: z.number() }</text>

  <rect x="524" y="205" width="240" height="54" rx="7" fill="#0D1117" stroke="#3FB950" stroke-width="1.5"/>
  <text x="644" y="227" text-anchor="middle" font-size="11" font-weight="700" fill="#3FB950">server.tool("greet", ...)</text>
  <text x="644" y="247" text-anchor="middle" font-size="10" fill="#8B949E">{ name: z.string() }</text>

  <rect x="524" y="275" width="240" height="54" rx="7" fill="#0D1117" stroke="#3FB950" stroke-width="1.5"/>
  <text x="644" y="297" text-anchor="middle" font-size="11" font-weight="700" fill="#3FB950">server.tool("search", ...)</text>
  <text x="644" y="317" text-anchor="middle" font-size="10" fill="#8B949E">{ query: z.string(), limit: z.number() }</text>

  <text x="644" y="360" text-anchor="middle" font-size="11" fill="#8B949E" font-style="italic">... más tools ...</text>

  <!-- Code snippet at bottom of McpServer box -->
  <rect x="524" y="375" width="240" height="60" rx="5" fill="#0D1117"/>
  <text x="534" y="393" font-size="9" fill="#8B949E">await server.connect(transport);</text>
  <text x="534" y="408" font-size="9" fill="#8B949E">// McpServer toma el control del</text>
  <text x="534" y="423" font-size="9" fill="#8B949E">// loop stdio hasta que stdin cierra</text>

  <!-- ── Bottom: code summary ── -->
  <rect x="30" y="200" width="455" height="250" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="247" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#E6EDF3">Estructura mínima en TypeScript</text>

  <text x="50" y="248" font-size="10" fill="#BC8CFF">import</text>
  <text x="78" y="248" font-size="10" fill="#E6EDF3">{ McpServer } </text>
  <text x="168" y="248" font-size="10" fill="#BC8CFF">from</text>
  <text x="191" y="248" font-size="10" fill="#3FB950">"...sdk/server/mcp.js"</text>

  <text x="50" y="265" font-size="10" fill="#BC8CFF">import</text>
  <text x="78" y="265" font-size="10" fill="#E6EDF3">{ StdioServerTransport } </text>
  <text x="230" y="265" font-size="10" fill="#BC8CFF">from</text>
  <text x="253" y="265" font-size="10" fill="#3FB950">"...sdk/server/stdio.js"</text>

  <text x="50" y="282" font-size="10" fill="#BC8CFF">import</text>
  <text x="78" y="282" font-size="10" fill="#E6EDF3">{ z } </text>
  <text x="110" y="282" font-size="10" fill="#BC8CFF">from</text>
  <text x="133" y="282" font-size="10" fill="#3FB950">"zod"</text>

  <text x="50" y="305" font-size="10" fill="#BC8CFF">const</text>
  <text x="78" y="305" font-size="10" fill="#58A6FF">server</text>
  <text x="111" y="305" font-size="10" fill="#E6EDF3">= </text>
  <text x="120" y="305" font-size="10" fill="#BC8CFF">new</text>
  <text x="140" y="305" font-size="10" fill="#F0883E">McpServer</text>
  <text x="196" y="305" font-size="10" fill="#E6EDF3">({ name: </text>
  <text x="260" y="305" font-size="10" fill="#3FB950">"my-server"</text>
  <text x="328" y="305" font-size="10" fill="#E6EDF3">, version: </text>
  <text x="393" y="305" font-size="10" fill="#3FB950">"1.0.0"</text>
  <text x="433" y="305" font-size="10" fill="#E6EDF3">});</text>

  <text x="50" y="328" font-size="10" fill="#58A6FF">server</text>
  <text x="83" y="328" font-size="10" fill="#E6EDF3">.tool(</text>
  <text x="115" y="328" font-size="10" fill="#3FB950">"add"</text>
  <text x="143" y="328" font-size="10" fill="#E6EDF3">, </text>
  <text x="151" y="328" font-size="10" fill="#8B949E">// name</text>

  <text x="68" y="345" font-size="10" fill="#E6EDF3">{ a: </text>
  <text x="91" y="345" font-size="10" fill="#F0883E">z</text>
  <text x="98" y="345" font-size="10" fill="#E6EDF3">.number(), b: </text>
  <text x="178" y="345" font-size="10" fill="#F0883E">z</text>
  <text x="185" y="345" font-size="10" fill="#E6EDF3">.number() },  </text>
  <text x="280" y="345" font-size="10" fill="#8B949E">// Zod schema</text>

  <text x="68" y="362" font-size="10" fill="#BC8CFF">async</text>
  <text x="97" y="362" font-size="10" fill="#E6EDF3">({ a, b }) </text>
  <text x="158" y="362" font-size="10" fill="#BC8CFF">=></text>
  <text x="173" y="362" font-size="10" fill="#E6EDF3">({</text>

  <text x="86" y="378" font-size="10" fill="#E6EDF3">content: [{ type: </text>
  <text x="208" y="378" font-size="10" fill="#3FB950">"text"</text>
  <text x="240" y="378" font-size="10" fill="#E6EDF3">, text: </text>
  <text x="283" y="378" font-size="10" fill="#F0883E">String</text>
  <text x="317" y="378" font-size="10" fill="#E6EDF3">(a + b) }]</text>

  <text x="68" y="394" font-size="10" fill="#E6EDF3">})</text>
  <text x="50" y="410" font-size="10" fill="#E6EDF3">);</text>

  <text x="50" y="432" font-size="10" fill="#BC8CFF">const</text>
  <text x="78" y="432" font-size="10" fill="#58A6FF">transport</text>
  <text x="130" y="432" font-size="10" fill="#E6EDF3">= </text>
  <text x="140" y="432" font-size="10" fill="#BC8CFF">new</text>
  <text x="160" y="432" font-size="10" fill="#F0883E">StdioServerTransport</text>
  <text x="297" y="432" font-size="10" fill="#E6EDF3">();</text>

  <text x="50" y="449" font-size="10" fill="#BC8CFF">await</text>
  <text x="78" y="449" font-size="10" fill="#58A6FF">server</text>
  <text x="110" y="449" font-size="10" fill="#E6EDF3">.connect(</text>
  <text x="162" y="449" font-size="10" fill="#58A6FF">transport</text>
  <text x="211" y="449" font-size="10" fill="#E6EDF3">);</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58A6FF"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B4FBB"/>
    </marker>
  </defs>
</svg>
