<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440" font-family="system-ui, -apple-system, sans-serif">
  <rect width="820" height="440" fill="#0D1117"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#E6EDF3">pnpm + TypeScript: Ciclo de Desarrollo</text>
  <text x="410" y="57" text-anchor="middle" font-size="13" fill="#8B949E">package.json → pnpm install → tsc → node dist/index.js</text>

  <!-- Step boxes (horizontal flow) -->
  <!-- Box 1: package.json -->
  <rect x="30" y="90" width="155" height="140" rx="10" fill="#161B22" stroke="#F0883E" stroke-width="1.5"/>
  <text x="107" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#F0883E">package.json</text>
  <text x="42" y="135" font-size="9" fill="#E6EDF3">{</text>
  <text x="52" y="151" font-size="9" fill="#58A6FF">"name"</text>
  <text x="84" y="151" font-size="9" fill="#E6EDF3">: </text>
  <text x="91" y="151" font-size="9" fill="#3FB950">"my-server"</text>
  <text x="52" y="167" font-size="9" fill="#58A6FF">"type"</text>
  <text x="84" y="167" font-size="9" fill="#E6EDF3">: </text>
  <text x="91" y="167" font-size="9" fill="#3FB950">"module"</text>
  <text x="52" y="183" font-size="9" fill="#58A6FF">"scripts"</text>
  <text x="92" y="183" font-size="9" fill="#E6EDF3">: {</text>
  <text x="64" y="199" font-size="9" fill="#58A6FF">"build"</text>
  <text x="96" y="199" font-size="9" fill="#E6EDF3">: </text>
  <text x="103" y="199" font-size="9" fill="#3FB950">"tsc"</text>
  <text x="52" y="215" font-size="9" fill="#E6EDF3">},</text>
  <text x="52" y="223" font-size="9" fill="#8B949E">...</text>

  <!-- Arrow 1 -->
  <line x1="185" y1="160" x2="215" y2="160" stroke="#6B4FBB" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="200" y="153" text-anchor="middle" font-size="9" fill="#8B949E">pnpm</text>
  <text x="200" y="172" text-anchor="middle" font-size="9" fill="#8B949E">install</text>

  <!-- Box 2: node_modules -->
  <rect x="217" y="90" width="155" height="140" rx="10" fill="#161B22" stroke="#6B4FBB" stroke-width="1.5"/>
  <text x="294" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#6B4FBB">node_modules/</text>
  <text x="294" y="133" text-anchor="middle" font-size="10" fill="#8B949E">dependencias instaladas</text>

  <text x="233" y="158" font-size="9" fill="#E6EDF3">@modelcontextprotocol/</text>
  <text x="240" y="174" font-size="9" fill="#E6EDF3">  sdk/</text>
  <text x="233" y="190" font-size="9" fill="#E6EDF3">zod/</text>
  <text x="233" y="206" font-size="9" fill="#E6EDF3">typescript/  (dev)</text>
  <text x="233" y="222" font-size="9" fill="#E6EDF3">@types/node/  (dev)</text>

  <!-- Arrow 2 -->
  <line x1="372" y1="160" x2="402" y2="160" stroke="#6B4FBB" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="387" y="153" text-anchor="middle" font-size="9" fill="#8B949E">pnpm</text>
  <text x="387" y="172" text-anchor="middle" font-size="9" fill="#8B949E">build</text>

  <!-- Box 3: tsc compilation -->
  <rect x="404" y="90" width="155" height="140" rx="10" fill="#161B22" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="481" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#58A6FF">tsc</text>
  <text x="481" y="130" text-anchor="middle" font-size="10" fill="#8B949E">compilación TypeScript</text>

  <text x="420" y="154" font-size="9" fill="#8B949E">src/index.ts   →</text>
  <text x="420" y="170" font-size="9" fill="#3FB950">dist/index.js  ✓</text>
  <text x="420" y="190" font-size="9" fill="#8B949E">según tsconfig.json:</text>
  <text x="420" y="206" font-size="9" fill="#E6EDF3">target: ES2022</text>
  <text x="420" y="222" font-size="9" fill="#E6EDF3">module: Node16</text>

  <!-- Arrow 3 -->
  <line x1="559" y1="160" x2="589" y2="160" stroke="#6B4FBB" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="574" y="153" text-anchor="middle" font-size="9" fill="#8B949E">node</text>
  <text x="574" y="172" text-anchor="middle" font-size="9" fill="#8B949E">run</text>

  <!-- Box 4: dist/ running -->
  <rect x="591" y="90" width="200" height="140" rx="10" fill="#161B22" stroke="#3FB950" stroke-width="1.5"/>
  <text x="691" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#3FB950">node dist/index.js</text>
  <text x="691" y="130" text-anchor="middle" font-size="10" fill="#8B949E">MCP Server corriendo</text>

  <text x="607" y="155" font-size="9" fill="#8B949E">stdin: leyendo JSON-RPC...</text>
  <text x="607" y="171" font-size="9" fill="#3FB950">✓ McpServer listo</text>
  <text x="607" y="187" font-size="9" fill="#3FB950">✓ Tools registrados</text>
  <text x="607" y="203" font-size="9" fill="#3FB950">✓ Esperando requests</text>
  <text x="607" y="221" font-size="9" fill="#8B949E">stdout: respuestas...</text>

  <!-- tsconfig.json details -->
  <rect x="30" y="265" width="365" height="150" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="212" y="287" text-anchor="middle" font-size="12" font-weight="700" fill="#E6EDF3">tsconfig.json</text>

  <text x="46" y="310" font-size="10" fill="#E6EDF3">{  </text>
  <text x="58" y="310" font-size="10" fill="#58A6FF">"compilerOptions"</text>
  <text x="162" y="310" font-size="10" fill="#E6EDF3">: {</text>
  <text x="70" y="327" font-size="10" fill="#58A6FF">"target"</text>
  <text x="108" y="327" font-size="10" fill="#E6EDF3">: </text>
  <text x="118" y="327" font-size="10" fill="#3FB950">"ES2022"</text>
  <text x="168" y="327" font-size="10" fill="#E6EDF3">,</text>
  <text x="182" y="327" font-size="10" fill="#8B949E">  // Node.js 22 lo soporta nativamente</text>

  <text x="70" y="344" font-size="10" fill="#58A6FF">"module"</text>
  <text x="109" y="344" font-size="10" fill="#E6EDF3">: </text>
  <text x="119" y="344" font-size="10" fill="#3FB950">"Node16"</text>
  <text x="163" y="344" font-size="10" fill="#E6EDF3">,</text>
  <text x="177" y="344" font-size="10" fill="#8B949E">  // ESM con .js extensions</text>

  <text x="70" y="361" font-size="10" fill="#58A6FF">"moduleResolution"</text>
  <text x="181" y="361" font-size="10" fill="#E6EDF3">: </text>
  <text x="192" y="361" font-size="10" fill="#3FB950">"Node16"</text>

  <text x="70" y="378" font-size="10" fill="#58A6FF">"outDir"</text>
  <text x="108" y="378" font-size="10" fill="#E6EDF3">: </text>
  <text x="118" y="378" font-size="10" fill="#3FB950">"./dist"</text>
  <text x="148" y="378" font-size="10" fill="#E6EDF3">,</text>
  <text x="162" y="378" font-size="10" fill="#8B949E">  // archivos JS compilados</text>

  <text x="70" y="395" font-size="10" fill="#58A6FF">"strict"</text>
  <text x="105" y="395" font-size="10" fill="#E6EDF3">: </text>
  <text x="114" y="395" font-size="10" fill="#BC8CFF">true</text>

  <!-- Docker section -->
  <rect x="415" y="265" width="375" height="150" rx="10" fill="#161B22" stroke="#58A6FF" stroke-width="1"/>
  <text x="602" y="287" text-anchor="middle" font-size="12" font-weight="700" fill="#58A6FF">Dockerfile (Node.js + pnpm)</text>

  <text x="431" y="310" font-size="9" fill="#BC8CFF">FROM</text>
  <text x="455" y="310" font-size="9" fill="#E6EDF3">node:22-slim</text>

  <text x="431" y="326" font-size="9" fill="#BC8CFF">RUN</text>
  <text x="449" y="326" font-size="9" fill="#E6EDF3">corepack enable </text>
  <text x="551" y="326" font-size="9" fill="#BC8CFF">&amp;&amp;</text>
  <text x="561" y="326" font-size="9" fill="#E6EDF3">corepack prepare pnpm@9.15.4</text>

  <text x="431" y="342" font-size="9" fill="#BC8CFF">WORKDIR</text>
  <text x="475" y="342" font-size="9" fill="#E6EDF3">/app</text>

  <text x="431" y="358" font-size="9" fill="#BC8CFF">COPY</text>
  <text x="455" y="358" font-size="9" fill="#E6EDF3">package.json ./</text>

  <text x="431" y="374" font-size="9" fill="#BC8CFF">RUN</text>
  <text x="449" y="374" font-size="9" fill="#3FB950">pnpm install</text>

  <text x="431" y="390" font-size="9" fill="#BC8CFF">COPY</text>
  <text x="455" y="390" font-size="9" fill="#E6EDF3">. .</text>
  <text x="475" y="406" font-size="9" fill="#BC8CFF">RUN</text>
  <text x="493" y="406" font-size="9" fill="#3FB950">pnpm build</text>

  <text x="431" y="406" font-size="9" fill="#BC8CFF">RUN</text>
  <text x="449" y="406" font-size="9" fill="#3FB950">pnpm build</text>

  <text x="431" y="406" font-size="9" fill="#BC8CFF">RUN</text>
  <text x="449" y="406" font-size="9" fill="#3FB950">pnpm build</text>

  <!-- Fix overlapping by adding proper spacing -->
  <text x="431" y="406" font-size="9" fill="#BC8CFF">RUN</text>
  <text x="449" y="406" font-size="9" fill="#3FB950">pnpm build</text>

  <text x="431" y="390" font-size="9" fill="#BC8CFF">COPY</text>
  <text x="455" y="390" font-size="9" fill="#E6EDF3">. .</text>
  <text x="431" y="406" font-size="9" fill="#BC8CFF">RUN</text>
  <text x="449" y="406" font-size="9" fill="#3FB950">pnpm build</text>
  <text x="431" y="406" font-size="9" fill="#BC8CFF">CMD</text>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B4FBB"/>
    </marker>
  </defs>
</svg>
