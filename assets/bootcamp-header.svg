<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <marker id="arr-purple-end" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B4FBB"/>
    </marker>
    <marker id="arr-purple-start" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#6B4FBB"/>
    </marker>
    <marker id="arr-yellow-end" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E3B341"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0D1117"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="3" fill="#6B4FBB"/>

  <!-- Left vertical accent bar -->
  <rect x="36" y="28" width="3" height="144" fill="#6B4FBB"/>

  <!-- Divider between text and diagram -->
  <line x1="510" y1="20" x2="510" y2="180" stroke="#21262D" stroke-width="1"/>

  <!-- ─────────────────────────────────── -->
  <!--  RIGHT: MCP Architecture Diagram   -->
  <!-- ─────────────────────────────────── -->

  <!-- LLM node (top center) -->
  <rect x="614" y="24" width="82" height="32" rx="5" fill="#161B22" stroke="#E3B341" stroke-width="1.5"/>
  <text x="655" y="45" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#E3B341" text-anchor="middle">LLM</text>

  <!-- MCP Client node (bottom left) -->
  <rect x="533" y="118" width="92" height="32" rx="5" fill="#161B22" stroke="#6B4FBB" stroke-width="1.5"/>
  <text x="579" y="139" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#C9D1D9" text-anchor="middle">MCP Client</text>

  <!-- MCP Server node (bottom right) -->
  <rect x="683" y="118" width="92" height="32" rx="5" fill="#161B22" stroke="#238636" stroke-width="1.5"/>
  <text x="729" y="139" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#C9D1D9" text-anchor="middle">MCP Server</text>

  <!-- LLM → Client arrow (dashed yellow) -->
  <line x1="644" y1="57" x2="592" y2="116" stroke="#E3B341" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-yellow-end)"/>

  <!-- Client ↔ Server (MCP Protocol, bidirectional purple) -->
  <line x1="626" y1="134" x2="682" y2="134" stroke="#6B4FBB" stroke-width="2" marker-start="url(#arr-purple-start)" marker-end="url(#arr-purple-end)"/>

  <!-- Protocol label -->
  <text x="655" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#6B4FBB" text-anchor="middle">MCP Protocol</text>
  <text x="655" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#484F58" text-anchor="middle">JSON-RPC 2.0 · stdio · HTTP/SSE</text>

  <!-- ─────────────────────── -->
  <!--  LEFT: Text Content     -->
  <!-- ─────────────────────── -->

  <!-- Main title -->
  <text x="52" y="86" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="46" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Bootcamp MCP</text>

  <!-- Subtitle -->
  <text x="52" y="117" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="500" fill="#6B4FBB">Zero to Hero</text>

  <!-- Description -->
  <text x="52" y="139" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#8B949E">Model Context Protocol · Python + TypeScript</text>

  <!-- Badge: 12 semanas -->
  <rect x="52" y="153" width="88" height="22" rx="4" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="96" y="169" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#C9D1D9" text-anchor="middle">12 semanas</text>

  <!-- Badge: 96 horas -->
  <rect x="148" y="153" width="72" height="22" rx="4" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="184" y="169" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#C9D1D9" text-anchor="middle">96 horas</text>

  <!-- Badge: 8h / semana -->
  <rect x="228" y="153" width="76" height="22" rx="4" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="266" y="169" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#C9D1D9" text-anchor="middle">8h / semana</text>

  <!-- Badge: MCP Junior (purple accent) -->
  <rect x="312" y="153" width="82" height="22" rx="4" fill="#1C2128" stroke="#6B4FBB" stroke-width="1"/>
  <text x="353" y="169" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#6B4FBB" text-anchor="middle">MCP Junior</text>
</svg>
